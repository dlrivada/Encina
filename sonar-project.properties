# SonarCloud Configuration
# This file is the single source of truth for SonarCloud analysis settings.
# Do NOT set sonar.exclusions/inclusions in the UI — this file controls everything.

sonar.projectKey=dlrivada_Encina
sonar.organization=dlrivada

# ─── Language scope (WHITELIST approach) ──────────────────────────────────────
# This is a 100% C# project. Instead of blacklisting JS/HTML/SQL/etc.,
# we ONLY include what we want analyzed: C# source code and GitHub Actions.
sonar.inclusions=\
  src/**/*.cs,\
  .github/workflows/**/*.yml

# ─── Source exclusions (within included files) ────────────────────────────────
# These apply WITHIN the included paths above
sonar.exclusions=\
  **/Migrations/**,\
  **/*.g.cs,\
  **/obj/**,\
  **/bin/**

# ─── Duplication exclusions ───────────────────────────────────────────────────
# Provider implementations intentionally share structure (same interface, different SQL)
sonar.cpd.exclusions=\
  src/Encina.Dapper.*/**/*.cs,\
  src/Encina.ADO.*/**/*.cs,\
  src/Encina.Testing*/**/*.cs,\
  src/Encina.EntityFrameworkCore/**/*.cs,\
  src/Encina.MongoDB/**/*.cs,\
  src/Encina.Caching.*/**/*.cs,\
  src/Encina.DistributedLock.*/**/*.cs,\
  src/Encina.Marten/**/*.cs
