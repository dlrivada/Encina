# Codecov configuration for Encina
# ADR: docs/architecture/adr/023-coverage-strategy-codecov-sonarcloud.md
# Issue: #911

codecov:
  require_ci_to_pass: false
  notify:
    wait_for_ci: true

coverage:
  precision: 1
  round: down
  range: "50...90"

  status:
    project:
      default:
        target: auto
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: 60%
        threshold: 5%

  # Note: Components require Codecov Pro plan (not available on free tier)
  # Per-module coverage is tracked via Flags and the code tree view instead.

# Flags: one per test type, merged by Codecov
flags:
  unit:
    paths:
      - src/
    carryforward: true
  guard:
    paths:
      - src/
    carryforward: true
  contract:
    paths:
      - src/
    carryforward: true
  property:
    paths:
      - src/
    carryforward: true
  integration:
    paths:
      - src/
    carryforward: true

# Exclude from coverage analysis
ignore:
  - "src/Encina.Testing/**"
  - "src/Encina.Testing.*/**"
  - "src/Encina.Cli/**"
  - "tests/**"
  - "docs/**"
  - "scripts/**"
  - "tools/**"
  - "**/*.g.cs"
  - "**/Migrations/**"
  - "**/obj/**"
  - "**/bin/**"
  - "**/GlobalSuppressions.cs"
  - "**/AssemblyInfo.cs"

# PR comment configuration
comment:
  layout: "condensed_header,condensed_files,condensed_footer"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

