name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOTNET_SDK_VERSION: "10.0.x"

jobs:
  # Detect which areas changed to skip unaffected test jobs
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests-unit: ${{ steps.filter.outputs.tests-unit }}
      tests-integration: ${{ steps.filter.outputs.tests-integration }}
      tests-guard: ${{ steps.filter.outputs.tests-guard }}
      tests-contract: ${{ steps.filter.outputs.tests-contract }}
      tests-property: ${{ steps.filter.outputs.tests-property }}
      tests-ef: ${{ steps.filter.outputs.tests-ef }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'Directory.*.props'
              - '*.slnx'
            tests-unit:
              - 'src/**'
              - 'tests/Encina.UnitTests/**'
            tests-integration:
              - 'src/**'
              - 'tests/Encina.IntegrationTests/**'
              - 'tests/Encina.TestInfrastructure/**'
            tests-guard:
              - 'src/**'
              - 'tests/Encina.GuardTests/**'
            tests-contract:
              - 'src/**'
              - 'tests/Encina.ContractTests/**'
            tests-property:
              - 'src/**'
              - 'tests/Encina.PropertyTests/**'
            tests-ef:
              - 'src/Encina.EntityFrameworkCore/**'
              - 'tests/Encina.IntegrationTests/**/EntityFrameworkCore/**'
            infra:
              - '.github/**'

  # Build job - quality checks, build, and artifact creation
  build:
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Cache build output
        uses: actions/cache@v5
        with:
          path: |
            **/obj/Release/**
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.cs', '**/*.csproj', 'Directory.*.props') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Restore
        run: dotnet restore Encina.slnx

      - name: Check formatting
        run: dotnet format Encina.slnx --verify-no-changes

      - name: Build
        run: dotnet build Encina.slnx --configuration Release --no-restore -warnaserror

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: |
            **/bin/Release/net10.0/**/*.dll
            **/bin/Release/net10.0/**/*.pdb
            **/bin/Release/net10.0/**/*.deps.json
            **/bin/Release/net10.0/**/*.runtimeconfig.json
            **/obj/**/*.assets.json
          retention-days: 1

  # Unit tests - split into shards for parallel execution
  test-unit:
    needs: [changes, build]
    if: needs.changes.outputs.tests-unit == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: Testing
            filter: "FullyQualifiedName~Encina.UnitTests.Testing"
          - name: Messaging
            filter: "FullyQualifiedName~Encina.UnitTests.Messaging|FullyQualifiedName~Encina.UnitTests.Caching"
          - name: Data
            filter: "FullyQualifiedName~Encina.UnitTests.EntityFrameworkCore|FullyQualifiedName~Encina.UnitTests.Dapper|FullyQualifiedName~Encina.UnitTests.ADO|FullyQualifiedName~Encina.UnitTests.MongoDB|FullyQualifiedName~Encina.UnitTests.Marten"
          - name: Cloud
            filter: "FullyQualifiedName~Encina.UnitTests.AzureFunctions|FullyQualifiedName~Encina.UnitTests.AzureServiceBus|FullyQualifiedName~Encina.UnitTests.Polly|FullyQualifiedName~Encina.UnitTests.AwsLambda|FullyQualifiedName~Encina.UnitTests.Aspire|FullyQualifiedName~Encina.UnitTests.OpenTelemetry|FullyQualifiedName~Encina.UnitTests.DistributedLock"
          - name: Security
            filter: "FullyQualifiedName~Encina.UnitTests.Security"
          - name: Compliance
            filter: "FullyQualifiedName~Encina.UnitTests.Compliance"
          - name: Infrastructure
            filter: "FullyQualifiedName~Encina.UnitTests.Cdc|FullyQualifiedName~Encina.UnitTests.Sharding|FullyQualifiedName~Encina.UnitTests.Tenancy|FullyQualifiedName~Encina.UnitTests.IdGeneration|FullyQualifiedName~Encina.UnitTests.GraphQL|FullyQualifiedName~Encina.UnitTests.Database|FullyQualifiedName~Encina.UnitTests.Migrations|FullyQualifiedName~Encina.UnitTests.AuditMarten"
          - name: Remaining
            filter: "FullyQualifiedName~Encina.UnitTests.Core|FullyQualifiedName~Encina.UnitTests.DomainModeling|FullyQualifiedName~Encina.UnitTests.AspNetCore|FullyQualifiedName~Encina.UnitTests.gRPC|FullyQualifiedName~Encina.UnitTests.SignalR|FullyQualifiedName~Encina.UnitTests.GuardClauses|FullyQualifiedName~Encina.UnitTests.MQTT|FullyQualifiedName~Encina.UnitTests.NATS|FullyQualifiedName~Encina.UnitTests.RabbitMQ|FullyQualifiedName~Encina.UnitTests.AmazonSQS|FullyQualifiedName~Encina.UnitTests.Kafka|FullyQualifiedName~Encina.UnitTests.Workflows|FullyQualifiedName~Encina.UnitTests.MiniValidator|FullyQualifiedName~Encina.UnitTests.FluentValidation|FullyQualifiedName~Encina.UnitTests.DataAnnotations|FullyQualifiedName~Encina.UnitTests.Quartz|FullyQualifiedName~Encina.UnitTests.Hangfire|FullyQualifiedName~Encina.UnitTests.Extensions|FullyQualifiedName~Encina.UnitTests.Refit|FullyQualifiedName~Encina.UnitTests.Cli|FullyQualifiedName~Encina.UnitTests.Pipeline|FullyQualifiedName~Encina.UnitTests.Dispatchers|FullyQualifiedName~Encina.UnitTests.TestResults"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}
      - uses: actions/download-artifact@v8
        with:
          name: build-output
      - name: Run Unit tests (${{ matrix.shard.name }})
        run: |
          dotnet test tests/Encina.UnitTests/Encina.UnitTests.csproj -c Release \
            --filter "${{ matrix.shard.filter }}" \
            --collect "XPlat Code Coverage" \
            --results-directory artifacts/test-results/UnitTests-${{ matrix.shard.name }} \
            --logger "trx;LogFileName=UnitTests-${{ matrix.shard.name }}.trx" \
            -- xunit.parallelizeTestCollections=true
        # Test failures MUST fail the CI — no continue-on-error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-UnitTests-${{ matrix.shard.name }}
          path: artifacts/test-results/UnitTests-${{ matrix.shard.name }}
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit
          files: artifacts/test-results/UnitTests-${{ matrix.shard.name }}/**/coverage.cobertura.xml
          fail_ci_if_error: false

  # Integration tests - split by data access provider for parallel execution
  test-integration:
    needs: [changes, build]
    if: needs.changes.outputs.tests-integration == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: ADO
            filter: "FullyQualifiedName~IntegrationTests.ADO"
          - name: Dapper
            filter: "FullyQualifiedName~IntegrationTests.Dapper"
          - name: EFCore
            filter: "FullyQualifiedName~IntegrationTests.Infrastructure"
    steps:
      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.AspNetCore.App/6.0.* || true
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.AspNetCore.App/7.0.* || true
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.AspNetCore.App/8.0.* || true
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.NETCore.App/6.0.* || true
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.NETCore.App/7.0.* || true
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.NETCore.App/8.0.* || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          echo "=== Disk space after cleanup ==="
          df -h /

      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}
      - uses: actions/download-artifact@v8
        with:
          name: build-output

      - name: Run Integration tests (${{ matrix.shard.name }})
        run: |
          dotnet test tests/Encina.IntegrationTests/Encina.IntegrationTests.csproj -c Release \
            --filter "${{ matrix.shard.filter }}" \
            --collect "XPlat Code Coverage" \
            --results-directory artifacts/test-results/IntegrationTests-${{ matrix.shard.name }} \
            --logger "trx;LogFileName=IntegrationTests-${{ matrix.shard.name }}.trx" \
            -- xunit.parallelizeTestCollections=true
        # Test failures MUST fail the CI — no continue-on-error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-IntegrationTests-${{ matrix.shard.name }}
          path: artifacts/test-results/IntegrationTests-${{ matrix.shard.name }}
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: integration
          files: artifacts/test-results/IntegrationTests-${{ matrix.shard.name }}/**/coverage.cobertura.xml
          fail_ci_if_error: false

  # Contract tests
  test-contract:
    needs: [changes, build]
    if: needs.changes.outputs.tests-contract == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}
      - uses: actions/download-artifact@v8
        with:
          name: build-output
      - name: Run Contract tests
        run: |
          dotnet test tests/Encina.ContractTests/Encina.ContractTests.csproj -c Release \
            --collect "XPlat Code Coverage" \
            --results-directory artifacts/test-results/ContractTests \
            --logger "trx;LogFileName=ContractTests.trx"
        # Test failures MUST fail the CI — no continue-on-error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ContractTests
          path: artifacts/test-results/ContractTests
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: contract
          files: artifacts/test-results/ContractTests/**/coverage.cobertura.xml
          fail_ci_if_error: false

  # Property tests
  test-property:
    needs: [changes, build]
    if: needs.changes.outputs.tests-property == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}
      - uses: actions/download-artifact@v8
        with:
          name: build-output
      - name: Run Property tests
        run: |
          dotnet test tests/Encina.PropertyTests/Encina.PropertyTests.csproj -c Release \
            --collect "XPlat Code Coverage" \
            --results-directory artifacts/test-results/PropertyTests \
            --logger "trx;LogFileName=PropertyTests.trx"
        # Test failures MUST fail the CI — no continue-on-error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-PropertyTests
          path: artifacts/test-results/PropertyTests
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: property
          files: artifacts/test-results/PropertyTests/**/coverage.cobertura.xml
          fail_ci_if_error: false

  # Guard tests
  test-guard:
    needs: [changes, build]
    if: needs.changes.outputs.tests-guard == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}
      - uses: actions/download-artifact@v8
        with:
          name: build-output
      - name: Run Guard tests
        run: |
          dotnet test tests/Encina.GuardTests/Encina.GuardTests.csproj -c Release \
            --collect "XPlat Code Coverage" \
            --results-directory artifacts/test-results/GuardTests \
            --logger "trx;LogFileName=GuardTests.trx"
        # Test failures MUST fail the CI — no continue-on-error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-GuardTests
          path: artifacts/test-results/GuardTests
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: guard
          files: artifacts/test-results/GuardTests/**/coverage.cobertura.xml
          fail_ci_if_error: false

  # EF Core multi-provider integration tests
  # Tests EF Core against all 4 database providers (Sqlite, SqlServer, PostgreSQL, MySQL)
  # to ensure LINQ translation and provider-specific behavior works correctly across providers.
  # MySQL tests are skipped until Pomelo.EntityFrameworkCore.MySql v10 is released.
  # Note: Oracle was removed from pre-1.0 scope (see ADR-009)
  test-ef-providers:
    needs: [changes, build]
    if: needs.changes.outputs.tests-ef == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        database:
          - name: Sqlite
            # SQLite uses in-process database, no service container needed
            trait: "Sqlite"
          - name: SqlServer
            trait: "SqlServer"
          - name: PostgreSQL
            trait: "PostgreSQL"
          - name: MySQL
            trait: "MySQL"

    # Service containers for database providers (conditionally started based on matrix)
    services:
      sqlserver:
        image: ${{ matrix.database.name == 'SqlServer' && 'mcr.microsoft.com/mssql/server:2022-latest' || '' }}
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: Encina_Test_123!
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Encina_Test_123! -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 1433:1433

      postgres:
        image: ${{ matrix.database.name == 'PostgreSQL' && 'postgres:16' || '' }}
        env:
          POSTGRES_USER: encina
          POSTGRES_PASSWORD: encina_test
          POSTGRES_DB: encina_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mysql:
        image: ${{ matrix.database.name == 'MySQL' && 'mysql:8' || '' }}
        env:
          MYSQL_ROOT_PASSWORD: encina_test
          MYSQL_DATABASE: encina_test
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

    env:
      # Connection strings for each database provider
      ConnectionStrings__SqlServer: "Server=localhost,1433;Database=encina_test;User Id=sa;Password=Encina_Test_123!;TrustServerCertificate=true"
      ConnectionStrings__PostgreSQL: "Host=localhost;Port=5432;Database=encina_test;Username=encina;Password=encina_test"
      ConnectionStrings__MySQL: "Server=localhost;Port=3306;Database=encina_test;User=root;Password=encina_test"
      ConnectionStrings__Sqlite: "Data Source=encina_test.db"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - uses: actions/download-artifact@v8
        with:
          name: build-output

      - name: Run EF Core ${{ matrix.database.name }} tests
        run: |
          # Filter for EF Core tests with specific database trait
          # Tests must have [Trait("Database", "{Provider}")] to be included
          dotnet test tests/Encina.IntegrationTests/Encina.IntegrationTests.csproj -c Release \
            --filter "FullyQualifiedName~EntityFrameworkCore&Database=${{ matrix.database.trait }}" \
            --collect "XPlat Code Coverage" \
            --results-directory artifacts/test-results/EFCore-${{ matrix.database.name }} \
            --logger "trx;LogFileName=EFCore-${{ matrix.database.name }}.trx" \
            -- xunit.parallelizeTestCollections=true
        # Test failures MUST fail the CI — no continue-on-error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-EFCore-${{ matrix.database.name }}
          path: artifacts/test-results/EFCore-${{ matrix.database.name }}
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: integration
          files: artifacts/test-results/EFCore-${{ matrix.database.name }}/**/coverage.cobertura.xml
          fail_ci_if_error: false

  # NOTE: Coverage reporting and Pack are in ci-full.yml only.
  # CI-fast skips coverage to avoid partial data from skipped test jobs.
  # Coverage dashboard is updated only by CI Full (weekly/manual/release).
