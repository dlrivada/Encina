name: Publish Coverage Data

# Triggered when CI completes — downloads the coverage artifact
# and deploys it to GitHub Pages alongside the existing site.
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI Full run ID to use (leave empty for latest successful)'
        required: false
  workflow_run:
    workflows: ["CI Full"]
    types: [completed]
    branches: [main]

permissions:
  pages: write
  id-token: write
  actions: read
  contents: write

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}coverage/

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve CI Full run ID
        id: resolve
        run: |
          RID="${{ inputs.run_id || github.event.workflow_run.id }}"
          if [ -z "$RID" ]; then
            RID=$(gh run list --workflow "CI Full" --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId')
            echo "Auto-resolved latest successful CI Full: $RID"
          fi
          echo "run_id=$RID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download coverage artifact from CI
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: coverage-artifact
          run-id: ${{ steps.resolve.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Pages site with fresh coverage data
        run: |
          # Copy the entire docs/ directory as the Pages site
          cp -r docs _site

          # Override coverage data with fresh CI artifact
          mkdir -p _site/coverage/data
          cp -f coverage-artifact/encina-coverage-summary.json _site/coverage/data/latest.json 2>/dev/null || true
          cp -f coverage-artifact/badge.svg _site/coverage/badge.svg 2>/dev/null || true
          cp -f coverage-artifact/badge.json _site/coverage/badge.json 2>/dev/null || true

          # Inject runId into the snapshot so history can reference raw artifacts
          RUN_ID="${{ github.event.workflow_run.id }}"
          if command -v jq &>/dev/null; then
            jq --argjson rid "$RUN_ID" '. + {runId: $rid}' \
              _site/coverage/data/latest.json > _tmp.json && mv _tmp.json _site/coverage/data/latest.json
          fi

          # Archive snapshot
          STAMP=$(date -u +"%Y-%m-%dT%H%M%SZ")
          cp -f _site/coverage/data/latest.json "_site/coverage/data/${STAMP}.json" 2>/dev/null || true

          # Repo history.json is the sole source of truth.
          # If it's empty ([]), we start fresh — never fetch stale data from Pages.
          echo "Using repo history.json ($(grep -c timestamp _site/coverage/data/history.json || echo 0) entries)"

          # Update history (appends current snapshot)
          dotnet run .github/scripts/coverage-history.cs -- \
            --latest _site/coverage/data/latest.json \
            --history _site/coverage/data/history.json || true

          echo "Coverage data updated. History entries:"
          cat _site/coverage/data/history.json | head -5

      - name: Persist history.json back to repo
        run: |
          cp -f _site/coverage/data/history.json docs/coverage/data/history.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/coverage/data/history.json
          if git diff --cached --quiet; then
            echo "No history changes to commit"
          else
            ENTRIES=$(grep -c timestamp docs/coverage/data/history.json || echo 0)
            git commit -m "chore: update coverage history ($ENTRIES entries)"
            git push origin main
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
