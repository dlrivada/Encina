name: Publish Coverage Data

# Triggered when CI completes — downloads the coverage artifact
# and deploys it to GitHub Pages alongside the existing site.
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI Full run ID to use (leave empty for latest successful)'
        required: false
  workflow_run:
    workflows: ["CI Full"]
    types: [completed]
    branches: [main]

permissions:
  pages: write
  id-token: write
  actions: read
  contents: write

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}coverage/

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve CI Full run ID
        id: resolve
        run: |
          RID="${{ inputs.run_id || github.event.workflow_run.id }}"
          if [ -z "$RID" ]; then
            RID=$(gh run list --workflow "CI Full" --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId')
            echo "Auto-resolved latest successful CI Full: $RID"
          fi
          echo "run_id=$RID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download coverage artifact from CI
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: coverage-artifact
          run-id: ${{ steps.resolve.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Pages site with fresh coverage data
        run: |
          # Copy the entire docs/ directory as the Pages site
          cp -r docs _site

          # Multiple publish-* workflows share a single gh-pages deployment target.
          # Overlay the live Pages copies of the sibling domains (benchmarks, load-tests)
          # so their data survives this deploy untouched. Our own coverage subtree is
          # then overridden below with the fresh CI artifact, which is authoritative.
          for domain in benchmarks load-tests; do
            echo "Fetching live $domain data from Pages (to preserve across deploy)..."
            mkdir -p "_site/$domain/data"
            for file in latest.json history.json docref-index.json fingerprints.json cited-by.json benchmark-coverage.json; do
              url="https://dlrivada.github.io/Encina/$domain/data/$file"
              if curl -fsSL -o "_site/$domain/data/$file.new" "$url" 2>/dev/null; then
                mv "_site/$domain/data/$file.new" "_site/$domain/data/$file"
                echo "  ✓ $file"
              else
                rm -f "_site/$domain/data/$file.new"
                echo "  - $file (not on Pages yet)"
              fi
            done
          done

          # Override coverage data with fresh CI artifact
          mkdir -p _site/coverage/data
          cp -f coverage-artifact/encina-coverage-summary.json _site/coverage/data/latest.json 2>/dev/null || true
          cp -f coverage-artifact/badge.svg _site/coverage/badge.svg 2>/dev/null || true
          cp -f coverage-artifact/badge.json _site/coverage/badge.json 2>/dev/null || true

          # Inject runId into the snapshot so history can reference raw artifacts
          RUN_ID="${{ github.event.workflow_run.id }}"
          if command -v jq &>/dev/null; then
            jq --argjson rid "$RUN_ID" '. + {runId: $rid}' \
              _site/coverage/data/latest.json > _tmp.json && mv _tmp.json _site/coverage/data/latest.json
          fi

          # Archive snapshot
          STAMP=$(date -u +"%Y-%m-%dT%H%M%SZ")
          cp -f _site/coverage/data/latest.json "_site/coverage/data/${STAMP}.json" 2>/dev/null || true

          # History strategy: fetch from live Pages (most complete), fall back to repo.
          # The repo version may lag behind because auto-push is blocked by branch protection.
          PAGES_URL="https://dlrivada.github.io/Encina/coverage/data/history.json"
          PAGES_HISTORY=$(curl -fsSL "$PAGES_URL" 2>/dev/null || echo "")
          REPO_ENTRIES=$(grep -c timestamp _site/coverage/data/history.json 2>/dev/null || echo 0)

          if [ -n "$PAGES_HISTORY" ] && echo "$PAGES_HISTORY" | head -1 | grep -q '^\['; then
            PAGES_ENTRIES=$(echo "$PAGES_HISTORY" | grep -c timestamp || echo 0)
            if [ "$PAGES_ENTRIES" -ge "$REPO_ENTRIES" ]; then
              echo "Using Pages history ($PAGES_ENTRIES entries, repo has $REPO_ENTRIES)"
              echo "$PAGES_HISTORY" > _site/coverage/data/history.json
            else
              echo "Using repo history ($REPO_ENTRIES entries, Pages has $PAGES_ENTRIES)"
            fi
          else
            echo "Using repo history ($REPO_ENTRIES entries, Pages not available)"
          fi

          # Update history (appends current snapshot)
          dotnet run .github/scripts/coverage-history.cs -- \
            --latest _site/coverage/data/latest.json \
            --history _site/coverage/data/history.json || true

          echo "Coverage data updated. History entries:"
          cat _site/coverage/data/history.json | head -5

      - name: Persist history.json back to repo
        continue-on-error: true
        run: |
          cp -f _site/coverage/data/history.json docs/coverage/data/history.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/coverage/data/history.json
          if git diff --cached --quiet; then
            echo "No history changes to commit"
          else
            ENTRIES=$(grep -c timestamp docs/coverage/data/history.json || echo 0)
            git commit -m "chore: update coverage history ($ENTRIES entries)"
            git push origin main || echo "Warning: Could not push history update (branch protection). History will be updated on next manual push."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
