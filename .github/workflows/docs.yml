name: Documentation

# Builds the documentation site (Jekyll narrative + DocFX API reference)
# and deploys to GitHub Pages. See issue #91 for the hybrid architecture.
#
# Scopes:
#   Jekyll  -> docs/**/*.md (just-the-docs theme, narrative content)
#   DocFX   -> src/**/*.csproj (API reference from XML comments) -> /api/
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**/*.cs'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'src/**/*.cs'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_NOLOGO: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore Encina.slnx

      - name: Build solution (XML docs generation)
        run: dotnet build Encina.slnx --configuration Release --no-restore

      - name: Generate API metadata (DocFX)
        run: dotnet docfx metadata docs/docfx.json --warningsAsErrors false

      - name: Build API reference site (DocFX)
        run: dotnet docfx build docs/docfx.json --warningsAsErrors false

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
          future: false
          verbose: false

      - name: Merge DocFX API reference into Jekyll site
        shell: bash
        run: |
          if [ ! -d docs/_api-build ]; then
            echo "::error::DocFX output directory docs/_api-build not found"
            exit 1
          fi
          mkdir -p _site/api
          cp -r docs/_api-build/. _site/api/
          echo "API reference merged into _site/api/"
          ls -la _site/api/ | head -20

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
