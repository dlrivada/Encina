name: Link Check

on:
    push:
        paths:
            - "**.md"
            - ".lycheeignore"
            - "lychee.toml"
    pull_request:
        paths:
            - "**.md"
    schedule:
        # Run weekly on Sundays at 3:00 AM UTC
        - cron: "0 3 * * 0"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    check-links:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Check markdown links
              uses: lycheeverse/lychee-action@v2
              with:
                  args: >-
                      --verbose
                      --no-progress
                      'docs/**/*.md'
                      '.github/**/*.md'
                      'README.md'
                      'CHANGELOG.md'
                      'CONTRIBUTING.md'
                      'ROADMAP.md'
                  fail: true
