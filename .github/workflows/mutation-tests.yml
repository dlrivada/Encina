name: Mutation Tests

on:
  workflow_dispatch:
    inputs:
      diff_mode:
        description: "Only mutate files changed since main (faster PR-style runs)"
        type: boolean
        default: false
      full_mode:
        description: "Mutate ALL files (very slow — hours). Default: only recent changes."
        type: boolean
        default: false
  schedule:
    # Run weekly on Fridays at 3:00 AM UTC
    - cron: "0 3 * * 5"

permissions:
  contents: read

jobs:
  run-mutation-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_NOLOGO: true
      DOTNET_SDK_VERSION: '10.0.x'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ env.DOTNET_SDK_VERSION }}-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ env.DOTNET_SDK_VERSION }}
            ${{ runner.os }}-nuget

      - name: Cache dotnet tools
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-dotnet-tools-${{ env.DOTNET_SDK_VERSION }}
          restore-keys: |
            ${{ runner.os }}-dotnet-tools-${{ env.DOTNET_SDK_VERSION }}
            ${{ runner.os }}-dotnet-tools

      - name: Restore
        run: dotnet restore Encina.slnx

      - name: Build
        run: dotnet build Encina.slnx --configuration Release --no-restore

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Run Stryker test projects (diagnostic baseline)
        id: test-baseline
        continue-on-error: true
        run: |
          mkdir -p artifacts/test-baseline
          # Stryker auto-discovers every test project that references the mutated
          # project (src/Encina/Encina.csproj), not just the ones listed under
          # stryker-config.json:test-projects. Run all of them here so we know
          # which one owns the 76 failures Stryker reports.
          for proj in \
            tests/Encina.UnitTests/Encina.UnitTests.csproj \
            tests/Encina.PropertyTests/Encina.PropertyTests.csproj \
            tests/Encina.ContractTests/Encina.ContractTests.csproj \
            tests/Encina.GuardTests/Encina.GuardTests.csproj \
            tests/Encina.IntegrationTests/Encina.IntegrationTests.csproj \
            tests/Encina.LoadTests/Encina.LoadTests.csproj \
            tests/Encina.Testing.Examples/Encina.Testing.Examples.csproj; do
            name=$(basename "$proj" .csproj)
            echo "::group::$name"
            dotnet test "$proj" \
              --configuration Debug \
              --logger "trx;LogFileName=${name}.trx" \
              --results-directory artifacts/test-baseline \
              2>&1 | tee "artifacts/test-baseline/${name}.log" || true
            echo "::endgroup::"
          done

      - name: Upload diagnostic baseline
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-test-baseline
          path: artifacts/test-baseline
          if-no-files-found: ignore

      - name: Select mutation scope
        id: scope
        run: |
          # Without perTest coverage (xUnit v3 + Stryker, see stryker-mutator/
          # stryker-net#3117), AllTests mode runs ~23k tests per mutant.
          # Stryker also loads ALL 6,181 mutants into RAM during creation even
          # with --since, causing OOM on the 7GB runner.
          #
          # Strategy: restrict the --mutate glob to one folder at a time.
          # Schedule rotates weekly; dispatch can override.
          #
          # Each folder produces ~30-150 mutants = 1-3h in AllTests mode.
          # Each entry must produce ≤ ~80 mutants to complete within 3h
          # in AllTests mode (~3 min/mutant × 80 ≈ 4h with safety margin).
          # Rule of thumb: ≤ 8 .cs files per entry.
          FOLDERS=(
            "**/Core/*.cs"
            "**/Pipeline/Behaviors/*.cs"
            "**/Pipeline/*.cs"
            "**/Dispatchers/Strategies/*.cs"
            "**/Validation/*.cs"
            "**/Sharding/Migrations/Strategies/*.cs"
            "**/Sharding/Routing/*.cs"
            "**/Sharding/ReplicaSelection/*.cs"
            "**/Sharding/Execution/*.cs"
            "**/Sharding/Shadow/**/*.cs"
            "**/Sharding/Colocation/*.cs"
            "**/Sharding/TimeBased/*.cs"
            "**/Sharding/Resharding/Phases/*.cs"
            "**/Sharding/Diagnostics/*.cs"
            "**/Modules/Isolation/*.cs"
            "**/Results/*.cs"
            "**/Errors/*.cs"
          )

          if [ "${{ inputs.full_mode }}" = "true" ]; then
            SCOPE="**/*.cs"
          elif [ "${{ inputs.diff_mode }}" = "true" ]; then
            SCOPE="**/*.cs"
          else
            # Rotate based on ISO week number
            WEEK=$(date -u +%V)
            IDX=$(( 10#$WEEK % 17 ))
            SCOPE="${FOLDERS[$IDX]}"
          fi

          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "Selected mutation scope: $SCOPE"

      - name: Run mutation tests
        id: stryker
        run: |
          mkdir -p artifacts/mutation
          SCOPE="${{ steps.scope.outputs.scope }}"

          if [ "${{ inputs.diff_mode }}" = "true" ]; then
            echo "Mode: diff (vs main)"
            dotnet run --file .github/scripts/run-stryker.cs -- --since:main "--mutate:$SCOPE"
          elif [ "${{ inputs.full_mode }}" = "true" ]; then
            echo "Mode: full (all files — will take hours)"
            dotnet run --file .github/scripts/run-stryker.cs
          else
            echo "Mode: weekly rotation (scope: $SCOPE)"
            dotnet run --file .github/scripts/run-stryker.cs -- "--mutate:$SCOPE"
          fi

      - name: Upload Stryker logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stryker-logs
          path: artifacts/mutation/logs
          if-no-files-found: ignore

      - name: Summarize mutation results
        run: |
          output=$(dotnet run --file .github/scripts/update-mutation-summary.cs)
          echo "$output"
          {
            echo '### Mutation Summary';
            echo '```';
            echo "$output";
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Locate mutation report
        id: stryker-report
        run: |
          # Stryker creates reports directly in artifacts/mutation/reports/
          # or in artifacts/mutation/{timestamp}/reports/
          if [ -f "artifacts/mutation/reports/mutation-report.json" ]; then
            echo "reports-dir=artifacts/mutation/reports" >> "$GITHUB_OUTPUT"
            echo "summary-file=artifacts/mutation/reports/mutation-report.txt" >> "$GITHUB_OUTPUT"
          else
            # Look for timestamped subdirectory
            latest=$(ls -d artifacts/mutation/*/ 2>/dev/null | grep -v reports | sort | tail -n 1)
            if [ -n "$latest" ] && [ -f "${latest}reports/mutation-report.json" ]; then
              echo "reports-dir=${latest}reports" >> "$GITHUB_OUTPUT"
              echo "summary-file=${latest}reports/mutation-report.txt" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Publish Stryker text summary
        if: steps.stryker-report.outputs.summary-file != ''
        run: |
          summary_file="${{ steps.stryker-report.outputs.summary-file }}"
          if [ -f "$summary_file" ]; then
            {
              echo '### Mutation Report (Stryker Text)';
              echo '```';
              cat "$summary_file";
              echo '```';
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Warning: Summary file not found at $summary_file"
          fi

      - name: Upload mutation report artifact
        if: steps.stryker-report.outputs.reports-dir != ''
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: ${{ steps.stryker-report.outputs.reports-dir }}
