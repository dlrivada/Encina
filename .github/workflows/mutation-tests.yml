name: Mutation Tests

on:
  workflow_dispatch:
    inputs:
      diff_mode:
        description: "Only mutate files changed since main (collapses matrix to 1 shard)"
        type: boolean
        default: false
      full_mode:
        description: "Mutate ALL files in one shard (very slow). Default: 17-shard matrix."
        type: boolean
        default: false
      custom_scope:
        description: "Override mutation scope glob (collapses matrix to 1 shard). e.g. **/Pipeline/Behaviors/*.cs"
        type: string
        default: ""
  schedule:
    # Run weekly on Fridays at 3:00 AM UTC
    - cron: "0 3 * * 5"

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOTNET_SDK_VERSION: '10.0.x'

jobs:
  # Phase 1 — Select matrix shards.
  #
  # Default (scheduled run, or dispatch without overrides): emits 17 shard
  # entries, one per rotation folder. Every weekly run now mutates the entire
  # src/Encina/Encina.csproj in parallel instead of one folder per ISO-week.
  #
  # Dispatch overrides (custom_scope / full_mode / diff_mode) collapse the
  # matrix to a single shard so operators can target narrow scopes without
  # spawning 17 parallel runners.
  select-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      mode: ${{ steps.build.outputs.mode }}
      shard_count: ${{ steps.build.outputs.shard_count }}
    steps:
      - name: Build matrix
        id: build
        run: |
          # Keep FOLDERS and FILTERS in lock-step: each rotation entry pairs
          # a mutation scope glob with a VSTest --test-case-filter substring
          # (or empty to use the stryker-config.json default). See
          # docs/testing/mutation-measurement-methodology.md for the full
          # edge-case notes — especially the rationale for root-namespace
          # fallbacks and overly broad substrings.
          FOLDERS=(
            "**/Core/*.cs"
            "**/Pipeline/Behaviors/*.cs"
            "**/Pipeline/*.cs"
            "**/Dispatchers/Strategies/*.cs"
            "**/Validation/*.cs"
            "**/Sharding/Migrations/Strategies/*.cs"
            "**/Sharding/Routing/*.cs"
            "**/Sharding/ReplicaSelection/*.cs"
            "**/Sharding/Execution/*.cs"
            "**/Sharding/Shadow/**/*.cs"
            "**/Sharding/Colocation/*.cs"
            "**/Sharding/TimeBased/*.cs"
            "**/Sharding/Resharding/Phases/*.cs"
            "**/Sharding/Diagnostics/*.cs"
            "**/Modules/Isolation/*.cs"
            "**/Results/*.cs"
            "**/Sharding/Health/*.cs"
          )
          FILTERS=(
            "Encina.UnitTests.Core|Encina.ContractTests.Core"
            "Pipeline.Behaviors|Core.Pipeline"
            "Pipeline"
            "Dispatchers.Strategies"
            "Core.Validation"
            "Sharding.Migrations.Strategies"
            "Sharding.Routing"
            "Sharding.ReplicaSelection"
            "Sharding.Execution"
            "Sharding.Shadow"
            "Sharding.Colocation"
            "Sharding.TimeBased"
            "Sharding.Resharding"
            "Sharding.Diagnostics"
            "Modules.Isolation"
            ""
            "Sharding.Health"
          )

          if [ "${#FOLDERS[@]}" -ne "${#FILTERS[@]}" ]; then
            echo "::error::FOLDERS (${#FOLDERS[@]}) and FILTERS (${#FILTERS[@]}) must have the same length" >&2
            exit 1
          fi

          CUSTOM="${{ inputs.custom_scope }}"

          if [ -n "$CUSTOM" ]; then
            # Custom scope: reuse paired filter if the glob matches a rotation entry.
            FILTER=""
            for i in "${!FOLDERS[@]}"; do
              if [ "${FOLDERS[$i]}" = "$CUSTOM" ]; then
                FILTER="${FILTERS[$i]}"
                break
              fi
            done
            MATRIX=$(jq -nc --arg scope "$CUSTOM" --arg filter "$FILTER" \
              '[{idx: "custom", scope: $scope, filter: $filter}]')
            MODE="custom"
          elif [ "${{ inputs.full_mode }}" = "true" ]; then
            MATRIX=$(jq -nc '[{idx: "full", scope: "**/*.cs", filter: ""}]')
            MODE="full"
          elif [ "${{ inputs.diff_mode }}" = "true" ]; then
            MATRIX=$(jq -nc '[{idx: "diff", scope: "**/*.cs", filter: ""}]')
            MODE="diff"
          else
            # Default: emit all 17 rotation entries as matrix shards.
            ENTRIES=""
            for i in "${!FOLDERS[@]}"; do
              ENTRY=$(jq -nc --arg idx "$i" --arg scope "${FOLDERS[$i]}" --arg filter "${FILTERS[$i]}" \
                '{idx: $idx, scope: $scope, filter: $filter}')
              if [ -z "$ENTRIES" ]; then
                ENTRIES="$ENTRY"
              else
                ENTRIES="$ENTRIES,$ENTRY"
              fi
            done
            MATRIX="[$ENTRIES]"
            MODE="matrix"
          fi

          COUNT=$(echo "$MATRIX" | jq 'length')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "shard_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Mode: $MODE"
          echo "Shard count: $COUNT"
          echo "Matrix:"
          echo "$MATRIX" | jq .

  # Diagnostic baseline — runs once in parallel with the matrix instead of
  # once per shard. Stryker auto-discovers every test project that references
  # src/Encina/Encina.csproj; this step surfaces which project owns any
  # "unable to test" failures Stryker reports.
  test-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ env.DOTNET_SDK_VERSION }}-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ env.DOTNET_SDK_VERSION }}
            ${{ runner.os }}-nuget

      - name: Restore
        run: dotnet restore Encina.slnx

      - name: Build
        run: dotnet build Encina.slnx --configuration Release --no-restore

      - name: Run Stryker test projects (diagnostic baseline)
        run: |
          mkdir -p artifacts/test-baseline
          for proj in \
            tests/Encina.UnitTests/Encina.UnitTests.csproj \
            tests/Encina.PropertyTests/Encina.PropertyTests.csproj \
            tests/Encina.ContractTests/Encina.ContractTests.csproj \
            tests/Encina.GuardTests/Encina.GuardTests.csproj \
            tests/Encina.IntegrationTests/Encina.IntegrationTests.csproj \
            tests/Encina.LoadTests/Encina.LoadTests.csproj \
            tests/Encina.Testing.Examples/Encina.Testing.Examples.csproj; do
            name=$(basename "$proj" .csproj)
            echo "::group::$name"
            dotnet test "$proj" \
              --configuration Debug \
              --logger "trx;LogFileName=${name}.trx" \
              --results-directory artifacts/test-baseline \
              2>&1 | tee "artifacts/test-baseline/${name}.log" || true
            echo "::endgroup::"
          done

      - name: Upload diagnostic baseline
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-test-baseline
          path: artifacts/test-baseline
          if-no-files-found: ignore

  # Phase 2 — Run mutation tests per shard.
  #
  # With fail-fast: false, a single-shard failure does not abort the other
  # matrix entries. continue-on-error: true at the job level prevents any
  # shard failure from failing the overall workflow conclusion, so the
  # downstream publish-mutations workflow (which requires success) still
  # runs as long as the aggregate job succeeds.
  run-mutation-tests:
    needs: select-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.select-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ env.DOTNET_SDK_VERSION }}-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ env.DOTNET_SDK_VERSION }}
            ${{ runner.os }}-nuget

      - name: Cache dotnet tools
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-dotnet-tools-${{ env.DOTNET_SDK_VERSION }}
          restore-keys: |
            ${{ runner.os }}-dotnet-tools-${{ env.DOTNET_SDK_VERSION }}
            ${{ runner.os }}-dotnet-tools

      - name: Restore
        run: dotnet restore Encina.slnx

      - name: Build
        run: dotnet build Encina.slnx --configuration Release --no-restore

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Run mutation tests (shard ${{ matrix.idx }})
        id: stryker
        run: |
          mkdir -p artifacts/mutation
          SCOPE="${{ matrix.scope }}"
          FILTER="${{ matrix.filter }}"
          MODE="${{ needs.select-matrix.outputs.mode }}"

          echo "Shard idx: ${{ matrix.idx }}"
          echo "Scope: $SCOPE"
          echo "Filter: ${FILTER:-<default from stryker-config.json>}"
          echo "Mode: $MODE"

          # Build --mutate args: shard scope + standard exclusions.
          MUTATE_ARGS="--mutate:$SCOPE"
          for excl in '!**/Log.cs' '!**/LogMessages.cs' '!**/Diagnostics/*ActivitySource.cs' '!**/Diagnostics/*Metrics.cs' '!**/*Errors.cs' '!**/*Constants.cs'; do
            MUTATE_ARGS="$MUTATE_ARGS --mutate:$excl"
          done

          # Stryker.NET 4.14 exposes test-case-filter only via the config file,
          # not the CLI (stryker-mutator/stryker-net#3091). Patch the config
          # in place before invoking Stryker. CI runners are ephemeral, so
          # the in-place edit does not leak into tracked state.
          if [ -n "$FILTER" ]; then
            IFS='|' read -ra FILTER_PARTS <<< "$FILTER"
            TCF=""
            for part in "${FILTER_PARTS[@]}"; do
              if [ -z "$TCF" ]; then
                TCF="FullyQualifiedName~$part"
              else
                TCF="$TCF|FullyQualifiedName~$part"
              fi
            done
            echo "Patching stryker-config.json test-case-filter: $TCF"
            tmp=$(mktemp)
            jq --arg tcf "$TCF" '."stryker-config"."test-case-filter" = $tcf' \
              .github/stryker-config.json > "$tmp"
            mv "$tmp" .github/stryker-config.json
          else
            echo "No FILTER set; using stryker-config.json default test-case-filter"
          fi

          if [ "$MODE" = "diff" ]; then
            echo "Running diff mode (vs main)"
            dotnet run --file .github/scripts/run-stryker.cs -- --since:main $MUTATE_ARGS
          elif [ "$MODE" = "full" ]; then
            echo "Running full mode (all files — will take hours)"
            dotnet run --file .github/scripts/run-stryker.cs
          else
            echo "Running shard scope: $SCOPE"
            dotnet run --file .github/scripts/run-stryker.cs -- $MUTATE_ARGS
          fi

      - name: Locate mutation report
        id: stryker-report
        if: always()
        run: |
          # Stryker writes to artifacts/mutation/reports/ or artifacts/mutation/{timestamp}/reports/.
          if [ -f "artifacts/mutation/reports/mutation-report.json" ]; then
            echo "reports-dir=artifacts/mutation/reports" >> "$GITHUB_OUTPUT"
            echo "summary-file=artifacts/mutation/reports/mutation-report.txt" >> "$GITHUB_OUTPUT"
          else
            latest=$(ls -d artifacts/mutation/*/ 2>/dev/null | grep -v reports | sort | tail -n 1)
            if [ -n "$latest" ] && [ -f "${latest}reports/mutation-report.json" ]; then
              echo "reports-dir=${latest}reports" >> "$GITHUB_OUTPUT"
              echo "summary-file=${latest}reports/mutation-report.txt" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Publish shard text summary
        if: steps.stryker-report.outputs.summary-file != ''
        run: |
          summary_file="${{ steps.stryker-report.outputs.summary-file }}"
          if [ -f "$summary_file" ]; then
            {
              echo "### Mutation Report — Shard ${{ matrix.idx }} (\`${{ matrix.scope }}\`)";
              echo '```';
              cat "$summary_file";
              echo '```';
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload shard mutation report
        if: steps.stryker-report.outputs.reports-dir != ''
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report-shard-${{ matrix.idx }}
          path: ${{ steps.stryker-report.outputs.reports-dir }}
          if-no-files-found: error

      - name: Upload Stryker logs (shard ${{ matrix.idx }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stryker-logs-shard-${{ matrix.idx }}
          path: artifacts/mutation/logs
          if-no-files-found: ignore

  # Phase 3 — Aggregate shard reports into a single mutation-report artifact.
  #
  # publish-mutations.yml downloads an artifact named `mutation-report` and
  # runs mutation-history.cs on it. This job produces that artifact by
  # merging the `files` maps from every successful shard's report.
  #
  # if: always() so aggregate still runs if some shards failed. A downstream
  # check guards against the 0-shards-succeeded case.
  aggregate:
    needs: [select-matrix, run-mutation-tests]
    if: always() && needs.select-matrix.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Download shard reports
        uses: actions/download-artifact@v8
        with:
          pattern: mutation-report-shard-*
          path: shards

      - name: Merge shard reports
        id: merge
        run: |
          mkdir -p artifacts/mutation/reports
          SHARD_COUNT="${{ needs.select-matrix.outputs.shard_count }}"
          mapfile -t REPORTS < <(find shards -name "mutation-report.json" -type f | sort)
          SUCCESSFUL=${#REPORTS[@]}

          if [ "$SUCCESSFUL" -eq 0 ]; then
            echo "::error::No shard reports found. All $SHARD_COUNT shards failed to produce mutation-report.json."
            exit 1
          fi

          echo "Merging $SUCCESSFUL / $SHARD_COUNT shard reports:"
          printf '  - %s\n' "${REPORTS[@]}"

          # Combine every shard's `files` map into one. Each folder glob is
          # disjoint (non-recursive *.cs patterns), so file-path collisions
          # don't happen in practice; if they ever do, the last shard wins —
          # benign because both shards would have mutated the same file.
          # Metadata (thresholds, projectRoot, etc.) inherits from shard[0].
          jq -s '(.[0]) + {files: (map(.files) | add)}' "${REPORTS[@]}" \
            > artifacts/mutation/reports/mutation-report.json

          MUTANTS=$(jq '[.files | to_entries[] | .value.mutants // [] | length] | add // 0' \
            artifacts/mutation/reports/mutation-report.json)
          FILES=$(jq '.files | length' artifacts/mutation/reports/mutation-report.json)

          echo "successful=$SUCCESSFUL" >> "$GITHUB_OUTPUT"
          echo "mutants=$MUTANTS" >> "$GITHUB_OUTPUT"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

          {
            echo '### Matrix Aggregation';
            echo '';
            echo "| Metric | Value |";
            echo "|--------|------:|";
            echo "| Shards attempted | $SHARD_COUNT |";
            echo "| Shards with reports | $SUCCESSFUL |";
            echo "| Mutated files | $FILES |";
            echo "| Mutants | $MUTANTS |";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize aggregated results
        run: |
          output=$(dotnet run --file .github/scripts/update-mutation-summary.cs)
          echo "$output"
          {
            echo '';
            echo '### Mutation Summary (Aggregated)';
            echo '```';
            echo "$output";
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload aggregated mutation report
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: artifacts/mutation/reports
          if-no-files-found: error
