name: Mutation Tests

on:
  workflow_dispatch:
    inputs:
      diff_mode:
        description: "Only mutate files changed since main (faster PR-style runs)"
        type: boolean
        default: false
      full_mode:
        description: "Mutate ALL files (very slow — hours). Default: only recent changes."
        type: boolean
        default: false
      custom_scope:
        description: "Override mutation scope glob (e.g. **/Pipeline/Behaviors/*.cs). Overrides rotation."
        type: string
        default: ""
  schedule:
    # Run weekly on Fridays at 3:00 AM UTC
    - cron: "0 3 * * 5"

permissions:
  contents: read

jobs:
  run-mutation-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_NOLOGO: true
      DOTNET_SDK_VERSION: '10.0.x'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ env.DOTNET_SDK_VERSION }}-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ env.DOTNET_SDK_VERSION }}
            ${{ runner.os }}-nuget

      - name: Cache dotnet tools
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-dotnet-tools-${{ env.DOTNET_SDK_VERSION }}
          restore-keys: |
            ${{ runner.os }}-dotnet-tools-${{ env.DOTNET_SDK_VERSION }}
            ${{ runner.os }}-dotnet-tools

      - name: Restore
        run: dotnet restore Encina.slnx

      - name: Build
        run: dotnet build Encina.slnx --configuration Release --no-restore

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Run Stryker test projects (diagnostic baseline)
        id: test-baseline
        continue-on-error: true
        run: |
          mkdir -p artifacts/test-baseline
          # Stryker auto-discovers every test project that references the mutated
          # project (src/Encina/Encina.csproj), not just the ones listed under
          # stryker-config.json:test-projects. Run all of them here so we know
          # which one owns the 76 failures Stryker reports.
          for proj in \
            tests/Encina.UnitTests/Encina.UnitTests.csproj \
            tests/Encina.PropertyTests/Encina.PropertyTests.csproj \
            tests/Encina.ContractTests/Encina.ContractTests.csproj \
            tests/Encina.GuardTests/Encina.GuardTests.csproj \
            tests/Encina.IntegrationTests/Encina.IntegrationTests.csproj \
            tests/Encina.LoadTests/Encina.LoadTests.csproj \
            tests/Encina.Testing.Examples/Encina.Testing.Examples.csproj; do
            name=$(basename "$proj" .csproj)
            echo "::group::$name"
            dotnet test "$proj" \
              --configuration Debug \
              --logger "trx;LogFileName=${name}.trx" \
              --results-directory artifacts/test-baseline \
              2>&1 | tee "artifacts/test-baseline/${name}.log" || true
            echo "::endgroup::"
          done

      - name: Upload diagnostic baseline
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-test-baseline
          path: artifacts/test-baseline
          if-no-files-found: ignore

      - name: Select mutation scope
        id: scope
        run: |
          # Without perTest coverage (xUnit v3 + Stryker, see stryker-mutator/
          # stryker-net#3117), AllTests mode runs ~23k tests per mutant.
          # Stryker also loads ALL 6,181 mutants into RAM during creation even
          # with --since, causing OOM on the 7GB runner.
          #
          # Strategy: restrict the --mutate glob to one folder at a time AND
          # narrow --test-case-filter to only the tests that mirror that folder's
          # namespace. Schedule rotates weekly; dispatch can override.
          #
          # Each folder produces ~30-150 mutants. With per-folder filter the
          # tests per mutant drop from ~23k to ~20-500, so a folder run
          # completes in ~5-10 min instead of ~3 h.
          # Rule of thumb: ≤ 8 .cs files per entry to keep mutant count low.
          #
          # FILTERS is parallel to FOLDERS. Each entry is a pipe-separated list
          # of substrings; at runtime each substring is wrapped in
          # `FullyQualifiedName~<substring>` and joined with `|` (OR). The
          # substrings are chosen from test-namespace segments that mirror the
          # source folder (tests/Encina.UnitTests/Core/Sharding/Migrations/
          # Strategies/ → `Sharding.Migrations.Strategies`).
          #
          # Edge cases:
          # - `**/Core/*.cs`, `**/Pipeline/*.cs`, `**/Results/*.cs` live in
          #   `namespace Encina` (root) so the filter falls back to the
          #   explicit test-folder path.
          # - `**/Pipeline/*.cs` is non-recursive but `Pipeline` substring
          #   also matches `Pipeline.Behaviors` tests — accepted (broader is
          #   safe; narrower would risk false negatives).
          FOLDERS=(
            "**/Core/*.cs"
            "**/Pipeline/Behaviors/*.cs"
            "**/Pipeline/*.cs"
            "**/Dispatchers/Strategies/*.cs"
            "**/Validation/*.cs"
            "**/Sharding/Migrations/Strategies/*.cs"
            "**/Sharding/Routing/*.cs"
            "**/Sharding/ReplicaSelection/*.cs"
            "**/Sharding/Execution/*.cs"
            "**/Sharding/Shadow/**/*.cs"
            "**/Sharding/Colocation/*.cs"
            "**/Sharding/TimeBased/*.cs"
            "**/Sharding/Resharding/Phases/*.cs"
            "**/Sharding/Diagnostics/*.cs"
            "**/Modules/Isolation/*.cs"
            "**/Results/*.cs"
            "**/Sharding/Health/*.cs"
          )
          # An empty filter means "no override" — Stryker uses the default
          # `test-case-filter` from `stryker-config.json`. Use that for folders
          # with no discoverable mirror tests (e.g. **/Results/*.cs: source
          # files declare `namespace Encina;` and tests are scattered outside
          # any `Results`-named namespace).
          FILTERS=(
            "Encina.UnitTests.Core|Encina.ContractTests.Core"
            "Pipeline.Behaviors|Core.Pipeline"
            "Pipeline"
            "Dispatchers.Strategies"
            "Core.Validation"
            "Sharding.Migrations.Strategies"
            "Sharding.Routing"
            "Sharding.ReplicaSelection"
            "Sharding.Execution"
            "Sharding.Shadow"
            "Sharding.Colocation"
            "Sharding.TimeBased"
            "Sharding.Resharding"
            "Sharding.Diagnostics"
            "Modules.Isolation"
            ""
            "Sharding.Health"
          )

          # FOLDERS and FILTERS are indexed in lock-step. A mismatch would
          # silently pair a scope with the wrong filter, so fail fast.
          if [ "${#FOLDERS[@]}" -ne "${#FILTERS[@]}" ]; then
            echo "::error::FOLDERS (${#FOLDERS[@]}) and FILTERS (${#FILTERS[@]}) must have the same length" >&2
            exit 1
          fi

          CUSTOM="${{ inputs.custom_scope }}"
          FILTER=""
          if [ -n "$CUSTOM" ]; then
            SCOPE="$CUSTOM"
            # If the custom scope matches a rotation entry, reuse its filter.
            for i in "${!FOLDERS[@]}"; do
              if [ "${FOLDERS[$i]}" = "$CUSTOM" ]; then
                FILTER="${FILTERS[$i]}"
                break
              fi
            done
          elif [ "${{ inputs.full_mode }}" = "true" ]; then
            SCOPE="**/*.cs"
          elif [ "${{ inputs.diff_mode }}" = "true" ]; then
            SCOPE="**/*.cs"
          else
            # Rotate based on ISO week number, modulo the rotation length.
            WEEK=$(date -u +%V)
            IDX=$(( 10#$WEEK % ${#FOLDERS[@]} ))
            SCOPE="${FOLDERS[$IDX]}"
            FILTER="${FILTERS[$IDX]}"
          fi

          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "filter=$FILTER" >> "$GITHUB_OUTPUT"
          echo "Selected mutation scope: $SCOPE"
          echo "Selected test filter: ${FILTER:-<none — using config default>}"

      - name: Run mutation tests
        id: stryker
        run: |
          mkdir -p artifacts/mutation
          SCOPE="${{ steps.scope.outputs.scope }}"
          FILTER="${{ steps.scope.outputs.filter }}"

          # Build mutate args: include scope + standard exclusions
          MUTATE_ARGS="--mutate:$SCOPE"
          for excl in '!**/Log.cs' '!**/LogMessages.cs' '!**/Diagnostics/*ActivitySource.cs' '!**/Diagnostics/*Metrics.cs' '!**/*Errors.cs' '!**/*Constants.cs'; do
            MUTATE_ARGS="$MUTATE_ARGS --mutate:$excl"
          done

          # Stryker.NET 4.14 exposes `test-case-filter` only via the config
          # file, not the CLI (stryker-mutator/stryker-net#3091). To override
          # per-folder, patch `.github/stryker-config.json` in place before
          # invoking Stryker. Build the VSTest filter expression by wrapping
          # each pipe-separated substring in `FullyQualifiedName~<substring>`
          # joined with `|` (OR). CI runners are ephemeral, so the in-place
          # edit does not leak into tracked state.
          if [ -n "$FILTER" ]; then
            IFS='|' read -ra FILTER_PARTS <<< "$FILTER"
            TCF=""
            for part in "${FILTER_PARTS[@]}"; do
              if [ -z "$TCF" ]; then
                TCF="FullyQualifiedName~$part"
              else
                TCF="$TCF|FullyQualifiedName~$part"
              fi
            done
            echo "Patching stryker-config.json test-case-filter: $TCF"
            tmp=$(mktemp)
            jq --arg tcf "$TCF" '."stryker-config"."test-case-filter" = $tcf' \
              .github/stryker-config.json > "$tmp"
            mv "$tmp" .github/stryker-config.json
          else
            echo "No FILTER set; using stryker-config.json default test-case-filter"
          fi

          if [ "${{ inputs.diff_mode }}" = "true" ]; then
            echo "Mode: diff (vs main)"
            dotnet run --file .github/scripts/run-stryker.cs -- --since:main $MUTATE_ARGS
          elif [ "${{ inputs.full_mode }}" = "true" ]; then
            echo "Mode: full (all files — will take hours)"
            dotnet run --file .github/scripts/run-stryker.cs
          else
            echo "Mode: weekly rotation (scope: $SCOPE)"
            dotnet run --file .github/scripts/run-stryker.cs -- $MUTATE_ARGS
          fi

      - name: Upload Stryker logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stryker-logs
          path: artifacts/mutation/logs
          if-no-files-found: ignore

      - name: Summarize mutation results
        run: |
          output=$(dotnet run --file .github/scripts/update-mutation-summary.cs)
          echo "$output"
          {
            echo '### Mutation Summary';
            echo '```';
            echo "$output";
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Locate mutation report
        id: stryker-report
        run: |
          # Stryker creates reports directly in artifacts/mutation/reports/
          # or in artifacts/mutation/{timestamp}/reports/
          if [ -f "artifacts/mutation/reports/mutation-report.json" ]; then
            echo "reports-dir=artifacts/mutation/reports" >> "$GITHUB_OUTPUT"
            echo "summary-file=artifacts/mutation/reports/mutation-report.txt" >> "$GITHUB_OUTPUT"
          else
            # Look for timestamped subdirectory
            latest=$(ls -d artifacts/mutation/*/ 2>/dev/null | grep -v reports | sort | tail -n 1)
            if [ -n "$latest" ] && [ -f "${latest}reports/mutation-report.json" ]; then
              echo "reports-dir=${latest}reports" >> "$GITHUB_OUTPUT"
              echo "summary-file=${latest}reports/mutation-report.txt" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Publish Stryker text summary
        if: steps.stryker-report.outputs.summary-file != ''
        run: |
          summary_file="${{ steps.stryker-report.outputs.summary-file }}"
          if [ -f "$summary_file" ]; then
            {
              echo '### Mutation Report (Stryker Text)';
              echo '```';
              cat "$summary_file";
              echo '```';
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Warning: Summary file not found at $summary_file"
          fi

      - name: Upload mutation report artifact
        if: steps.stryker-report.outputs.reports-dir != ''
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: ${{ steps.stryker-report.outputs.reports-dir }}
