name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: 'BenchmarkDotNet job type (dry for PR validation, short for CI, medium/default for heavy runs)'
        required: false
        default: 'short'
        type: choice
        options:
          - dry
          - short
          - medium
          - default
      project_filter:
        description: 'Optional substring filter on project name (empty = all projects)'
        required: false
        default: ''
        type: string
      benchmark_filter:
        description: 'BenchmarkDotNet --filter expression (default "*")'
        required: false
        default: '*'
        type: string
  schedule:
    # Weekly full run: Sundays 01:07 UTC (off-peak, avoids :00/:30 congestion)
    - cron: "7 1 * * 0"

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  # Deterministic JIT to reduce run-to-run variance on shared cloud runners
  # (see performance-measurement-methodology.md — we quantify variance rather
  # than hide it, but removing obvious sources of jitter still improves signal).
  DOTNET_TieredCompilation: '0'

jobs:
  run-benchmarks:
    name: ${{ matrix.project.name }} (${{ matrix.project.os }})
    runs-on: ${{ matrix.project.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project:
          # Core + infrastructure benchmarks (Linux — faster, more available runners)
          - name: Core
            path: tests/Encina.BenchmarkTests/Encina.Benchmarks/Encina.Benchmarks.csproj
            os: ubuntu-latest
          - name: AspNetCore
            path: tests/Encina.BenchmarkTests/Encina.AspNetCore.Benchmarks/Encina.AspNetCore.Benchmarks.csproj
            os: ubuntu-latest

          # Data providers
          - name: ADO
            path: tests/Encina.BenchmarkTests/Encina.ADO.Benchmarks/Encina.ADO.Benchmarks.csproj
            os: ubuntu-latest
          - name: Dapper
            path: tests/Encina.BenchmarkTests/Encina.Dapper.Benchmarks/Encina.Dapper.Benchmarks.csproj
            os: ubuntu-latest
          - name: EFCore
            path: tests/Encina.BenchmarkTests/Encina.EntityFrameworkCore.Benchmarks/Encina.EntityFrameworkCore.Benchmarks.csproj
            os: ubuntu-latest

          # Caching, locking, resilience
          - name: Caching
            path: tests/Encina.BenchmarkTests/Encina.Caching.Benchmarks/Encina.Caching.Benchmarks.csproj
            os: ubuntu-latest
          - name: DistributedLock
            path: tests/Encina.BenchmarkTests/Encina.DistributedLock.Benchmarks/Encina.DistributedLock.Benchmarks.csproj
            os: ubuntu-latest
          - name: Polly
            path: tests/Encina.BenchmarkTests/Encina.Polly.Benchmarks/Encina.Polly.Benchmarks.csproj
            os: ubuntu-latest
          - name: ExtensionsResilience
            path: tests/Encina.BenchmarkTests/Encina.Extensions.Resilience.Benchmarks/Encina.Extensions.Resilience.Benchmarks.csproj
            os: ubuntu-latest

          # Security & cryptography
          - name: SecurityAntiTampering
            path: tests/Encina.BenchmarkTests/Encina.Security.AntiTampering.Benchmarks/Encina.Security.AntiTampering.Benchmarks.csproj
            os: ubuntu-latest
          - name: SecurityEncryption
            path: tests/Encina.BenchmarkTests/Encina.Security.Encryption.Benchmarks/Encina.Security.Encryption.Benchmarks.csproj
            os: ubuntu-latest
          - name: SecurityPII
            path: tests/Encina.BenchmarkTests/Encina.Security.PII.Benchmarks/Encina.Security.PII.Benchmarks.csproj
            os: ubuntu-latest
          - name: SecuritySanitization
            path: tests/Encina.BenchmarkTests/Encina.Security.Sanitization.Benchmarks/Encina.Security.Sanitization.Benchmarks.csproj
            os: ubuntu-latest

          # Identity
          - name: IdGeneration
            path: tests/Encina.BenchmarkTests/Encina.IdGeneration.Benchmarks/Encina.IdGeneration.Benchmarks.csproj
            os: ubuntu-latest

          # Audit, messaging, compliance
          - name: AuditMarten
            path: tests/Encina.BenchmarkTests/Encina.Audit.Marten.Benchmarks/Encina.Audit.Marten.Benchmarks.csproj
            os: ubuntu-latest
          - name: MartenGDPR
            path: tests/Encina.BenchmarkTests/Encina.Marten.GDPR.Benchmarks/Encina.Marten.GDPR.Benchmarks.csproj
            os: ubuntu-latest
          - name: MessagingEncryption
            path: tests/Encina.BenchmarkTests/Encina.Messaging.Encryption.Benchmarks/Encina.Messaging.Encryption.Benchmarks.csproj
            os: ubuntu-latest

          # HTTP & serverless
          - name: Refit
            path: tests/Encina.BenchmarkTests/Encina.Refit.Benchmarks/Encina.Refit.Benchmarks.csproj
            os: ubuntu-latest
          - name: AwsLambda
            path: tests/Encina.BenchmarkTests/Encina.AwsLambda.Benchmarks/Encina.AwsLambda.Benchmarks.csproj
            os: ubuntu-latest
          - name: AzureFunctions
            path: tests/Encina.BenchmarkTests/Encina.AzureFunctions.Benchmarks/Encina.AzureFunctions.Benchmarks.csproj
            os: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Skip if project filter excludes this project
        id: filter
        run: |
          FILTER="${{ github.event.inputs.project_filter }}"
          if [ -n "$FILTER" ] && ! echo "${{ matrix.project.name }}" | grep -q "$FILTER"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Project ${{ matrix.project.name }} filtered out."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET SDK
        if: steps.filter.outputs.skip != 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        if: steps.filter.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ matrix.project.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ matrix.project.os }}-nuget-

      - name: Restore
        if: steps.filter.outputs.skip != 'true'
        run: dotnet restore ${{ matrix.project.path }}

      - name: Run ${{ matrix.project.name }} benchmarks
        if: steps.filter.outputs.skip != 'true'
        env:
          PERF_JOB_TYPE: ${{ github.event.inputs.job_type || 'short' }}
        run: |
          JOB_TYPE="${{ github.event.inputs.job_type || 'short' }}"
          FILTER="${{ github.event.inputs.benchmark_filter || '*' }}"
          dotnet run --project ${{ matrix.project.path }} -c Release --no-restore -- \
            --artifacts "artifacts/performance/${{ matrix.project.name }}" \
            --exporters json csv html github \
            --job "$JOB_TYPE" \
            --filter "$FILTER"

      - name: Upload benchmark results
        if: always() && steps.filter.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-${{ matrix.project.name }}
          path: artifacts/performance/${{ matrix.project.name }}
          if-no-files-found: warn
          retention-days: 90

  aggregate:
    name: Aggregate all benchmark results
    needs: run-benchmarks
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download all benchmark artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: benchmarks-*
          path: artifacts/performance
          merge-multiple: false

      - name: Flatten artifacts
        run: |
          # Each artifact downloads as artifacts/performance/benchmarks-<Name>/<Name>/...
          # We want artifacts/performance/<Name>/...
          shopt -s nullglob
          for dir in artifacts/performance/benchmarks-*; do
            name="${dir#artifacts/performance/benchmarks-}"
            if [ -d "$dir/$name" ]; then
              mv "$dir/$name" "artifacts/performance/$name"
            fi
            rm -rf "$dir"
          done
          ls -la artifacts/performance/

      - name: Generate performance report
        run: |
          dotnet run .github/scripts/perf-report.cs -- \
            --kind benchmarks \
            --input artifacts/performance \
            --output artifacts/perf-output \
            --run-id ${{ github.run_id }} \
            --sha ${{ github.sha }}

      - name: Upload consolidated perf-report artifact
        uses: actions/upload-artifact@v7
        with:
          name: perf-report-benchmarks
          path: artifacts/perf-output
          if-no-files-found: error
          retention-days: 90

      - name: Upload raw artifacts for perf-raw archival
        uses: actions/upload-artifact@v7
        with:
          name: perf-raw-benchmarks-${{ github.run_id }}
          path: artifacts/performance
          if-no-files-found: warn
          retention-days: 90
