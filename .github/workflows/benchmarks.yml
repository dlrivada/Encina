name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: 'BenchmarkDotNet job type (short for CI, medium for weekly)'
        required: false
        default: 'short'
        type: choice
        options:
          - short
          - medium
          - default
  schedule:
    # Run weekly on Sundays at 1:00 AM UTC
    - cron: "0 1 * * 0"

permissions:
  contents: read

jobs:
  run-benchmarks:
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: Core
            path: tests/Encina.BenchmarkTests/Encina.Benchmarks/Encina.Benchmarks.csproj
          - name: ADO
            path: tests/Encina.BenchmarkTests/Encina.ADO.Benchmarks/Encina.ADO.Benchmarks.csproj
          - name: Dapper
            path: tests/Encina.BenchmarkTests/Encina.Dapper.Benchmarks/Encina.Dapper.Benchmarks.csproj
          - name: EFCore
            path: tests/Encina.BenchmarkTests/Encina.EntityFrameworkCore.Benchmarks/Encina.EntityFrameworkCore.Benchmarks.csproj
          - name: Caching
            path: tests/Encina.BenchmarkTests/Encina.Caching.Benchmarks/Encina.Caching.Benchmarks.csproj
          - name: Security
            path: tests/Encina.BenchmarkTests/Encina.Security.AntiTampering.Benchmarks/Encina.Security.AntiTampering.Benchmarks.csproj
          - name: IdGeneration
            path: tests/Encina.BenchmarkTests/Encina.IdGeneration.Benchmarks/Encina.IdGeneration.Benchmarks.csproj
          - name: Polly
            path: tests/Encina.BenchmarkTests/Encina.Polly.Benchmarks/Encina.Polly.Benchmarks.csproj
    defaults:
      run:
        shell: bash
    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_NOLOGO: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ${{ matrix.project.path }}

      - name: Run ${{ matrix.project.name }} benchmarks
        run: |
          JOB_TYPE="${{ github.event.inputs.job_type || 'short' }}"
          dotnet run --project ${{ matrix.project.path }} -c Release -- \
            --artifacts "artifacts/performance/${{ matrix.project.name }}" \
            --exporters csv html github \
            --job "$JOB_TYPE" \
            --filter "*"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-${{ matrix.project.name }}
          path: artifacts/performance/${{ matrix.project.name }}
          if-no-files-found: ignore
