name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: 'BenchmarkDotNet job type. IMPORTANT: short/dry runs are NOT published to the performance dashboard (IterationCount<10 marks every benchmark as unstable). Pick medium/default to refresh the public dashboard.'
        required: false
        default: 'medium'
        type: choice
        options:
          - dry
          - short
          - medium
          - default
      project_filter:
        description: 'Optional substring filter on project name (empty = all projects)'
        required: false
        default: ''
        type: string
      benchmark_filter:
        description: 'BenchmarkDotNet --filter expression (default "*")'
        required: false
        default: '*'
        type: string
      force_full:
        description: 'Force full run ignoring fingerprint cache (Phase 2)'
        required: false
        default: false
        type: boolean
  # Phase 2.3 — Path filter triggers: on PR, only dispatch when files that
  # could affect benchmark results change. The determine-matrix job further
  # narrows execution to the benchmark projects whose source fingerprints
  # actually differ from the last recorded run.
  pull_request:
    branches: [main]
    paths:
      - 'src/**/*.cs'
      - 'tests/Encina.BenchmarkTests/**'
      - 'Directory.Packages.props'
      - '.github/workflows/benchmarks.yml'
      - '.github/scripts/perf-*.cs'
  schedule:
    # Weekly full run: Sundays 01:07 UTC (off-peak, avoids :00/:30 congestion)
    - cron: "7 1 * * 0"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  # Deterministic JIT to reduce run-to-run variance on shared cloud runners
  # (see performance-measurement-methodology.md — we quantify variance rather
  # than hide it, but removing obvious sources of jitter still improves signal).
  DOTNET_TieredCompilation: '0'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Phase 2: Incremental filtering
  #
  # Compute fingerprints for all 20 benchmark projects, compare against the
  # previous run's fingerprints published on GitHub Pages, and emit a matrix
  # containing only the projects whose source closure changed. The aggregate
  # job downstream will carry forward the unchanged modules from the previous
  # snapshot so the dashboard always shows the complete picture.
  # ─────────────────────────────────────────────────────────────────────────
  determine-matrix:
    name: Determine matrix (incremental)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.emit.outputs.matrix }}
      matrix_count: ${{ steps.emit.outputs.count }}
      project_count: ${{ steps.emit.outputs.project_count }}
      skipped_projects: ${{ steps.emit.outputs.skipped }}
      force_full: ${{ steps.emit.outputs.force_full }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Compute current fingerprints
        run: |
          mkdir -p artifacts/perf-output
          dotnet run .github/scripts/perf-fingerprint.cs -- \
            --projects-dir tests/Encina.BenchmarkTests \
            --repo-root . \
            --output artifacts/perf-output/fingerprints.json
          cat artifacts/perf-output/fingerprints.json

      - name: Fetch previous fingerprints from Pages
        id: prev
        run: |
          mkdir -p artifacts/perf-previous
          # Pull from the live Pages URL (always the freshest — publish-benchmarks.yml
          # writes it there on every successful run). Fall back to the repo copy if Pages
          # is unreachable.
          if curl -fsSL -o artifacts/perf-previous/latest.json \
              "https://dlrivada.github.io/Encina/benchmarks/data/latest.json"; then
            echo "Fetched previous snapshot from Pages."
          elif [ -f docs/benchmarks/data/latest.json ]; then
            cp docs/benchmarks/data/latest.json artifacts/perf-previous/latest.json
            echo "Using repo copy of latest.json."
          else
            echo "No previous snapshot found — will run all projects."
            echo "{}" > artifacts/perf-previous/latest.json
          fi
          ls -la artifacts/perf-previous/

      - name: Build matrix from fingerprint diff
        id: emit
        env:
          FORCE_FULL: ${{ github.event.inputs.force_full || 'false' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # The full project catalog. Kept in one place here so adding a new benchmark
          # project is a single edit. Schedule runs always ignore the fingerprint cache
          # (full refresh), as do workflow_dispatch runs with force_full=true.
          cat > /tmp/full-matrix.json << 'EOF'
          [
            { "name": "Core",                 "path": "tests/Encina.BenchmarkTests/Encina.Benchmarks/Encina.Benchmarks.csproj",                               "project": "Encina.Benchmarks",                       "os": "ubuntu-latest" },
            { "name": "AspNetCore",           "path": "tests/Encina.BenchmarkTests/Encina.AspNetCore.Benchmarks/Encina.AspNetCore.Benchmarks.csproj",         "project": "Encina.AspNetCore.Benchmarks",            "os": "ubuntu-latest" },
            { "name": "ADOMySQL",             "path": "tests/Encina.BenchmarkTests/Encina.ADO.MySQL.Benchmarks/Encina.ADO.MySQL.Benchmarks.csproj",           "project": "Encina.ADO.MySQL.Benchmarks",             "os": "ubuntu-latest" },
            { "name": "ADOPostgreSQL",        "path": "tests/Encina.BenchmarkTests/Encina.ADO.PostgreSQL.Benchmarks/Encina.ADO.PostgreSQL.Benchmarks.csproj", "project": "Encina.ADO.PostgreSQL.Benchmarks",        "os": "ubuntu-latest" },
            { "name": "ADOSqlServer",         "path": "tests/Encina.BenchmarkTests/Encina.ADO.SqlServer.Benchmarks/Encina.ADO.SqlServer.Benchmarks.csproj",   "project": "Encina.ADO.SqlServer.Benchmarks",         "os": "ubuntu-latest" },
            { "name": "DapperMySQL",          "path": "tests/Encina.BenchmarkTests/Encina.Dapper.MySQL.Benchmarks/Encina.Dapper.MySQL.Benchmarks.csproj",     "project": "Encina.Dapper.MySQL.Benchmarks",          "os": "ubuntu-latest" },
            { "name": "DapperPostgreSQL",     "path": "tests/Encina.BenchmarkTests/Encina.Dapper.PostgreSQL.Benchmarks/Encina.Dapper.PostgreSQL.Benchmarks.csproj", "project": "Encina.Dapper.PostgreSQL.Benchmarks", "os": "ubuntu-latest" },
            { "name": "DapperSqlServer",      "path": "tests/Encina.BenchmarkTests/Encina.Dapper.SqlServer.Benchmarks/Encina.Dapper.SqlServer.Benchmarks.csproj", "project": "Encina.Dapper.SqlServer.Benchmarks",     "os": "ubuntu-latest" },
            { "name": "MongoDB",              "path": "tests/Encina.BenchmarkTests/Encina.MongoDB.Benchmarks/Encina.MongoDB.Benchmarks.csproj",                 "project": "Encina.MongoDB.Benchmarks",               "os": "ubuntu-latest" },
            { "name": "Cdc",                  "path": "tests/Encina.BenchmarkTests/Encina.Cdc.Benchmarks/Encina.Cdc.Benchmarks.csproj",                         "project": "Encina.Cdc.Benchmarks",                   "os": "ubuntu-latest" },
            { "name": "CdcMySql",             "path": "tests/Encina.BenchmarkTests/Encina.Cdc.MySql.Benchmarks/Encina.Cdc.MySql.Benchmarks.csproj",             "project": "Encina.Cdc.MySql.Benchmarks",             "os": "ubuntu-latest" },
            { "name": "CdcPostgreSql",        "path": "tests/Encina.BenchmarkTests/Encina.Cdc.PostgreSql.Benchmarks/Encina.Cdc.PostgreSql.Benchmarks.csproj",   "project": "Encina.Cdc.PostgreSql.Benchmarks",        "os": "ubuntu-latest" },
            { "name": "CdcSqlServer",         "path": "tests/Encina.BenchmarkTests/Encina.Cdc.SqlServer.Benchmarks/Encina.Cdc.SqlServer.Benchmarks.csproj",     "project": "Encina.Cdc.SqlServer.Benchmarks",         "os": "ubuntu-latest" },
            { "name": "CdcMongoDb",           "path": "tests/Encina.BenchmarkTests/Encina.Cdc.MongoDb.Benchmarks/Encina.Cdc.MongoDb.Benchmarks.csproj",         "project": "Encina.Cdc.MongoDb.Benchmarks",           "os": "ubuntu-latest" },
            { "name": "CdcDebezium",          "path": "tests/Encina.BenchmarkTests/Encina.Cdc.Debezium.Benchmarks/Encina.Cdc.Debezium.Benchmarks.csproj",       "project": "Encina.Cdc.Debezium.Benchmarks",          "os": "ubuntu-latest" },
            { "name": "EFCore",               "path": "tests/Encina.BenchmarkTests/Encina.EntityFrameworkCore.Benchmarks/Encina.EntityFrameworkCore.Benchmarks.csproj", "project": "Encina.EntityFrameworkCore.Benchmarks", "os": "ubuntu-latest" },
            { "name": "Caching",              "path": "tests/Encina.BenchmarkTests/Encina.Caching.Benchmarks/Encina.Caching.Benchmarks.csproj",               "project": "Encina.Caching.Benchmarks",               "os": "ubuntu-latest" },
            { "name": "CachingHybrid",        "path": "tests/Encina.BenchmarkTests/Encina.Caching.Hybrid.Benchmarks/Encina.Caching.Hybrid.Benchmarks.csproj", "project": "Encina.Caching.Hybrid.Benchmarks",        "os": "ubuntu-latest" },
            { "name": "CachingMemory",        "path": "tests/Encina.BenchmarkTests/Encina.Caching.Memory.Benchmarks/Encina.Caching.Memory.Benchmarks.csproj", "project": "Encina.Caching.Memory.Benchmarks",        "os": "ubuntu-latest" },
            { "name": "CachingRedis",         "path": "tests/Encina.BenchmarkTests/Encina.Caching.Redis.Benchmarks/Encina.Caching.Redis.Benchmarks.csproj",   "project": "Encina.Caching.Redis.Benchmarks",         "os": "ubuntu-latest" },
            { "name": "DistributedLock",      "path": "tests/Encina.BenchmarkTests/Encina.DistributedLock.Benchmarks/Encina.DistributedLock.Benchmarks.csproj", "project": "Encina.DistributedLock.Benchmarks",     "os": "ubuntu-latest" },
            { "name": "Polly",                "path": "tests/Encina.BenchmarkTests/Encina.Polly.Benchmarks/Encina.Polly.Benchmarks.csproj",                   "project": "Encina.Polly.Benchmarks",                 "os": "ubuntu-latest" },
            { "name": "ExtensionsResilience", "path": "tests/Encina.BenchmarkTests/Encina.Extensions.Resilience.Benchmarks/Encina.Extensions.Resilience.Benchmarks.csproj", "project": "Encina.Extensions.Resilience.Benchmarks", "os": "ubuntu-latest" },
            { "name": "SecurityAntiTampering","path": "tests/Encina.BenchmarkTests/Encina.Security.AntiTampering.Benchmarks/Encina.Security.AntiTampering.Benchmarks.csproj", "project": "Encina.Security.AntiTampering.Benchmarks", "os": "ubuntu-latest" },
            { "name": "SecurityEncryption",   "path": "tests/Encina.BenchmarkTests/Encina.Security.Encryption.Benchmarks/Encina.Security.Encryption.Benchmarks.csproj",       "project": "Encina.Security.Encryption.Benchmarks",    "os": "ubuntu-latest" },
            { "name": "SecurityPII",          "path": "tests/Encina.BenchmarkTests/Encina.Security.PII.Benchmarks/Encina.Security.PII.Benchmarks.csproj",                     "project": "Encina.Security.PII.Benchmarks",           "os": "ubuntu-latest" },
            { "name": "SecuritySanitization", "path": "tests/Encina.BenchmarkTests/Encina.Security.Sanitization.Benchmarks/Encina.Security.Sanitization.Benchmarks.csproj",   "project": "Encina.Security.Sanitization.Benchmarks",  "os": "ubuntu-latest" },
            { "name": "IdGeneration",         "path": "tests/Encina.BenchmarkTests/Encina.IdGeneration.Benchmarks/Encina.IdGeneration.Benchmarks.csproj",                     "project": "Encina.IdGeneration.Benchmarks",           "os": "ubuntu-latest" },
            { "name": "AuditMarten",          "path": "tests/Encina.BenchmarkTests/Encina.Audit.Marten.Benchmarks/Encina.Audit.Marten.Benchmarks.csproj",                     "project": "Encina.Audit.Marten.Benchmarks",           "os": "ubuntu-latest" },
            { "name": "MartenGDPR",           "path": "tests/Encina.BenchmarkTests/Encina.Marten.GDPR.Benchmarks/Encina.Marten.GDPR.Benchmarks.csproj",                       "project": "Encina.Marten.GDPR.Benchmarks",            "os": "ubuntu-latest" },
            { "name": "MessagingEncryption",  "path": "tests/Encina.BenchmarkTests/Encina.Messaging.Encryption.Benchmarks/Encina.Messaging.Encryption.Benchmarks.csproj",     "project": "Encina.Messaging.Encryption.Benchmarks",   "os": "ubuntu-latest" },
            { "name": "Refit",                "path": "tests/Encina.BenchmarkTests/Encina.Refit.Benchmarks/Encina.Refit.Benchmarks.csproj",                                   "project": "Encina.Refit.Benchmarks",                  "os": "ubuntu-latest" },
            { "name": "AwsLambda",            "path": "tests/Encina.BenchmarkTests/Encina.AwsLambda.Benchmarks/Encina.AwsLambda.Benchmarks.csproj",                           "project": "Encina.AwsLambda.Benchmarks",              "os": "ubuntu-latest" },
            { "name": "AzureFunctions",       "path": "tests/Encina.BenchmarkTests/Encina.AzureFunctions.Benchmarks/Encina.AzureFunctions.Benchmarks.csproj",                 "project": "Encina.AzureFunctions.Benchmarks",         "os": "ubuntu-latest" }
          ]
          EOF

          # Decide whether this is a forced-full run
          FORCE=false
          if [ "$EVENT_NAME" = "schedule" ]; then FORCE=true; fi
          if [ "$FORCE_FULL" = "true" ]; then FORCE=true; fi
          echo "force_full=$FORCE" >> "$GITHUB_OUTPUT"

          if [ "$FORCE" = "true" ]; then
            echo "Full run (schedule or force_full) — all 20 projects will execute."
            cp /tmp/full-matrix.json /tmp/changed.json
            SKIPPED="[]"
          else
            # Compare fingerprints and filter to changed projects
            dotnet run .github/scripts/perf-diff-fingerprints.cs -- \
              --current artifacts/perf-output/fingerprints.json \
              --previous artifacts/perf-previous/latest.json \
              --full-matrix /tmp/full-matrix.json \
              --changed-out /tmp/changed.json \
              --skipped-out /tmp/skipped.json
            SKIPPED=$(cat /tmp/skipped.json)
          fi

          PROJECT_COUNT=$(jq 'length' /tmp/changed.json)
          echo ""
          echo "Projects to run: $PROJECT_COUNT"
          echo "Skipped (carry forward): $(echo "$SKIPPED" | jq -r 'join(", ")' || echo '')"
          echo ""

          # Phase 3.1 — Fan out each project into one matrix entry per benchmark class.
          # This parallelises execution at class level: the slowest project no longer
          # dictates the overall wall-clock of the run.
          if [ "$PROJECT_COUNT" -gt 0 ]; then
            dotnet run .github/scripts/perf-class-matrix.cs -- \
              --projects /tmp/changed.json \
              --manifest-dir .github/perf-manifest \
              --output /tmp/class-matrix.json
            MATRIX=$(cat /tmp/class-matrix.json)
          else
            MATRIX="[]"
          fi

          COUNT=$(echo "$MATRIX" | jq 'length')
          echo ""
          echo "Matrix after class-level fan-out: $COUNT job(s) will run"

          # Emit outputs — wrap matrix in the {project: [...]} shape the consumer expects
          {
            echo "matrix<<EOF_MATRIX"
            echo "{\"project\": $MATRIX}"
            echo "EOF_MATRIX"
          } >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "project_count=$PROJECT_COUNT" >> "$GITHUB_OUTPUT"
          {
            echo "skipped<<EOF_SKIPPED"
            echo "$SKIPPED"
            echo "EOF_SKIPPED"
          } >> "$GITHUB_OUTPUT"

      - name: Upload current fingerprints + previous snapshot
        uses: actions/upload-artifact@v7
        with:
          name: perf-incremental-state
          path: |
            artifacts/perf-output/fingerprints.json
            artifacts/perf-previous/latest.json
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # Run benchmarks — matrix is dynamically provided by determine-matrix.
  # Phase 3.1: each matrix entry is ONE benchmark class (not a whole project),
  # so parallelism is bounded by the slowest individual class, not the slowest
  # project. A project with 32 classes now dispatches 32 parallel jobs.
  # ─────────────────────────────────────────────────────────────────────────
  run-benchmarks:
    name: ${{ matrix.project.name }} · ${{ matrix.project.class }}
    needs: determine-matrix
    if: needs.determine-matrix.outputs.matrix_count != '0'
    runs-on: ${{ matrix.project.os }}
    # 30 min suffices for dry/short; medium needs up to 60 min for classes with
    # many [Params] combinations (e.g., SpecificationEvaluatorBenchmarks × CriteriaCount).
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 30   # Cap concurrency so we don't exhaust the free-tier runner pool
      matrix: ${{ fromJson(needs.determine-matrix.outputs.matrix) }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Skip if project filter excludes this project
        id: filter
        run: |
          FILTER="${{ github.event.inputs.project_filter }}"
          if [ -n "$FILTER" ] && ! echo "${{ matrix.project.name }}" | grep -q "$FILTER"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Project ${{ matrix.project.name }} filtered out."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET SDK
        if: steps.filter.outputs.skip != 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        if: steps.filter.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ matrix.project.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ matrix.project.os }}-nuget-

      - name: Cache build output
        if: steps.filter.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          # Phase 3.2 — cache the compiled benchmark project so that multiple
          # class-level jobs of the same project on the same commit reuse the
          # build. First job of a project builds from scratch and saves; later
          # jobs (typically queued in the max-parallel pool) get a cache hit
          # and skip the dotnet build entirely (~30-60s saved per hit).
          path: |
            tests/Encina.BenchmarkTests/${{ matrix.project.project }}/bin
            tests/Encina.BenchmarkTests/${{ matrix.project.project }}/obj
          key: bench-build-${{ matrix.project.project }}-${{ github.sha }}

      - name: Restore
        if: steps.filter.outputs.skip != 'true'
        run: dotnet restore ${{ matrix.project.path }}

      - name: Run ${{ matrix.project.name }}.${{ matrix.project.class }}
        if: steps.filter.outputs.skip != 'true'
        env:
          PERF_JOB_TYPE: ${{ github.event.inputs.job_type || (github.event_name == 'schedule' && 'medium') || 'short' }}
        run: |
          JOB_TYPE="${{ github.event.inputs.job_type || (github.event_name == 'schedule' && 'medium') || 'short' }}"
          # The class-level filter comes from the matrix; the workflow_dispatch
          # benchmark_filter input narrows further within the class (e.g. a single
          # method). If the dispatch filter is the default '*', the class filter is
          # authoritative.
          DISPATCH_FILTER="${{ github.event.inputs.benchmark_filter || '*' }}"
          CLASS_FILTER='${{ matrix.project.filter }}'
          if [ "$DISPATCH_FILTER" = "*" ] || [ -z "$DISPATCH_FILTER" ]; then
            FINAL_FILTER="$CLASS_FILTER"
          else
            # Intersection: limit to methods matching dispatch filter within the class.
            FINAL_FILTER="${CLASS_FILTER%\*}.${DISPATCH_FILTER#\*}"
          fi
          echo "Using --filter: $FINAL_FILTER"

          # Absolute path for --artifacts (see issue #923). All class jobs of a
          # project write into the SAME subdir; upload-artifact is named uniquely
          # per class so concurrent jobs do not collide.
          ARTIFACTS_DIR="${{ github.workspace }}/artifacts/performance/${{ matrix.project.name }}"
          mkdir -p "$ARTIFACTS_DIR"
          dotnet run --project ${{ matrix.project.path }} -c Release --no-restore -- \
            --artifacts "$ARTIFACTS_DIR" \
            --exporters json csv html github \
            --job "$JOB_TYPE" \
            --filter "$FINAL_FILTER"

      - name: Upload benchmark results
        if: always() && steps.filter.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          # Artifact name is unique per (project, class) pair so concurrent jobs
          # do not collide. The aggregate job downloads with merge-multiple: true
          # to reassemble the full per-project result tree.
          name: benchmarks-${{ matrix.project.name }}-${{ matrix.project.artifactSuffix || matrix.project.class }}
          path: artifacts/performance
          if-no-files-found: warn
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────
  # Aggregate — merges fresh measurements with carried-forward modules from
  # the previous snapshot, producing a complete latest.json
  # ─────────────────────────────────────────────────────────────────────────
  aggregate:
    name: Aggregate all benchmark results
    needs: [determine-matrix, run-benchmarks]
    # Run even when run-benchmarks was skipped (all projects carried forward).
    if: always() && !cancelled() && needs.determine-matrix.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download incremental state (fingerprints + previous snapshot)
        uses: actions/download-artifact@v8
        with:
          name: perf-incremental-state
          path: incremental-state

      - name: Download benchmark artifacts (if any)
        if: needs.determine-matrix.outputs.matrix_count != '0'
        uses: actions/download-artifact@v8
        with:
          pattern: benchmarks-*
          path: artifacts/performance
          # merge-multiple:true extracts all class-level artifacts into the same
          # directory. Each artifact was uploaded from `artifacts/performance` as
          # its path, so its internal root is `<ProjectName>/results/<file>.json`.
          # Merging them reconstructs the full per-project tree:
          #   artifacts/performance/Caching/results/*.json  (all 7 classes merged)
          #   artifacts/performance/Core/results/*.json     (all 32 classes merged)
          merge-multiple: true
        continue-on-error: true

      - name: Summarise downloaded artifacts
        run: |
          if [ -d artifacts/performance ]; then
            echo "Artifacts downloaded:"
            find artifacts/performance -maxdepth 2 -type d | sort | head -50
            echo ""
            echo "Report files per project:"
            for d in artifacts/performance/*/; do
              count=$(find "$d" -name '*-report-full*.json' 2>/dev/null | wc -l)
              echo "  $(basename "$d"): $count report file(s)"
            done
          else
            echo "(no artifacts — all projects carried forward)"
          fi

      - name: Generate performance report with carry-forward
        env:
          # The class-level matrix jobs set PERF_JOB_TYPE locally, but each GitHub Actions
          # job has its own env scope and the aggregate job never received it. Without
          # this, perf-report.cs's BuildMetadata() falls back to its default ("short")
          # and writes metadata.jobType = "short" into latest.json — which then causes
          # publish-benchmarks.yml to early-exit the publish via the jobType-gate even
          # for genuine medium/default runs. Propagate the same expression used by the
          # per-class jobs so the metadata matches reality.
          PERF_JOB_TYPE: ${{ github.event.inputs.job_type || (github.event_name == 'schedule' && 'medium') || 'short' }}
        run: |
          # upload-artifact with multi-path strips the longest common prefix
          # ('artifacts/' here), so the extracted layout is perf-output/... and
          # perf-previous/..., not artifacts/perf-output/... etc.
          ls -la incremental-state/ || true
          find incremental-state -type f
          dotnet run .github/scripts/perf-report.cs -- \
            --kind benchmarks \
            --input artifacts/performance \
            --output artifacts/perf-output \
            --run-id ${{ github.run_id }} \
            --sha ${{ github.sha }} \
            --fingerprints-file incremental-state/perf-output/fingerprints.json \
            --carry-forward-from incremental-state/perf-previous/latest.json

      - name: Post PR comment with benchmark summary
        if: github.event_name == 'pull_request' && needs.determine-matrix.outputs.matrix_count != '0'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const latest = JSON.parse(fs.readFileSync('artifacts/perf-output/latest.json', 'utf8'));
            const o = latest.overall || {};
            const fresh = o.freshModules || 0;
            const carried = o.carriedForwardModules || 0;
            const total = o.totalMethods || 0;
            const stable = o.stableMethods || 0;
            const regressions = o.regressionCount || 0;

            const formatNs = (v) => {
              if (!v || v <= 0) return '—';
              if (v < 1000) return v.toFixed(2) + ' ns';
              if (v < 1e6) return (v / 1000).toFixed(2) + ' μs';
              return (v / 1e6).toFixed(2) + ' ms';
            };

            let body = `## Benchmark Results\n\n`;
            body += `| Metric | Value |\n|---|---|\n`;
            body += `| Fresh modules | ${fresh} |\n`;
            body += `| Carried forward | ${carried} |\n`;
            body += `| Total methods | ${total} (${stable} stable) |\n`;
            body += `| Mean latency | ${formatNs(o.meanLatencyNs)} |\n`;
            body += `| Mean allocated | ${((o.meanAllocatedBytes || 0) / 1024).toFixed(2)} KB |\n`;
            body += `| Regressions | ${regressions === 0 ? '✅ None' : `⚠️ ${regressions}`} |\n`;
            body += `\n[Full dashboard](https://dlrivada.github.io/Encina/benchmarks/dashboard/) · `;
            body += `[Run #${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n`;

            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            } catch (e) {
              core.warning(`Could not post PR comment (expected for Dependabot PRs): ${e.message}`);
            }

      - name: Upload consolidated perf-report artifact
        uses: actions/upload-artifact@v7
        with:
          name: perf-report-benchmarks
          path: artifacts/perf-output
          if-no-files-found: error
          retention-days: 90

      - name: Upload raw artifacts for perf-raw archival
        if: needs.determine-matrix.outputs.matrix_count != '0'
        uses: actions/upload-artifact@v7
        with:
          name: perf-raw-benchmarks-${{ github.run_id }}
          path: artifacts/performance
          if-no-files-found: warn
          retention-days: 90
