name: Publish Benchmarks Data

# Triggered when the Benchmarks workflow completes successfully.
# Downloads the consolidated perf-report artifact and the raw data artifact,
# archives raw data to the `perf-raw` orphan branch, updates history.json,
# and deploys the dashboard to GitHub Pages (coexists with publish-coverage).
#
# See ADR-025 + performance-measurement-methodology.md.
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Benchmarks run ID to use (leave empty for latest successful)'
        required: false
  workflow_run:
    workflows: ["Benchmarks"]
    types: [completed]
    branches: [main]

permissions:
  pages: write
  id-token: write
  actions: read
  contents: write

concurrency:
  group: publish-benchmarks
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}benchmarks/dashboard/

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve Benchmarks run ID
        id: resolve
        run: |
          RID="${{ inputs.run_id || github.event.workflow_run.id }}"
          if [ -z "$RID" ]; then
            RID=$(gh run list --workflow "Benchmarks" --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId')
            echo "Auto-resolved latest successful Benchmarks run: $RID"
          fi
          echo "run_id=$RID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download perf-report artifact
        uses: actions/download-artifact@v8
        with:
          name: perf-report-benchmarks
          path: perf-report-artifact
          run-id: ${{ steps.resolve.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download raw benchmark data
        uses: actions/download-artifact@v8
        with:
          name: perf-raw-benchmarks-${{ steps.resolve.outputs.run_id }}
          path: raw-data
          run-id: ${{ steps.resolve.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # Gate: only `medium`/`default` jobs are allowed to update the dashboard.
      # `short` and `dry` use IterationCount=3 and force every benchmark into the
      # "unstable" bucket (perf-report.cs enforces n >= 10 for stability, or a
      # stricter 3 % CoV for n in 3..9). Publishing their latest.json would overwrite
      # the dashboard with a ~18 % stable snapshot even though the underlying code
      # is fine, so we early-exit here. `unknown` is treated the same way — it
      # almost always means a workflow misconfiguration (PERF_JOB_TYPE env var not
      # propagated) and publishing silently would hide the bug.
      #
      # Raw artifacts remain available on the Benchmarks workflow page for
      # developer inspection; only the Pages-published dashboard is gated.
      - name: Detect source job type
        id: jobtype
        run: |
          JOB_TYPE=$(jq -r '.metadata.jobType // "unknown"' perf-report-artifact/latest.json)
          echo "job_type=$JOB_TYPE" >> "$GITHUB_OUTPUT"
          echo "Source run jobType: $JOB_TYPE"
          case "$JOB_TYPE" in
            medium|default)
              echo "skip=false" >> "$GITHUB_OUTPUT"
              ;;
            unknown)
              echo ""
              echo "::warning title=Skipping publish::Source run metadata.jobType is 'unknown'. This usually means the PERF_JOB_TYPE env var was not propagated to the aggregate job in benchmarks.yml. Fix the workflow, re-run, and the publish will proceed automatically."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo ""
              echo "::notice title=Skipping publish::Source run used --job $JOB_TYPE (IterationCount < 10); every benchmark would be reported as unstable. The run's artifacts remain available on the Benchmarks workflow page for inspection. Re-run with job_type=medium (or wait for the weekly schedule) to update the public dashboard."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Update docs/benchmarks/data
        if: steps.jobtype.outputs.skip != 'true'
        run: |
          mkdir -p docs/benchmarks/data
          cp -f perf-report-artifact/latest.json docs/benchmarks/data/latest.json
          cp -f perf-report-artifact/docref-index.json docs/benchmarks/data/docref-index.json 2>/dev/null || true
          # Phase 2 — persist current fingerprints so the next run can diff against them.
          cp -f perf-report-artifact/fingerprints.json docs/benchmarks/data/fingerprints.json 2>/dev/null || true
          # Copy any archived timestamped snapshot file
          find perf-report-artifact -maxdepth 1 -name "*.json" \
            ! -name "latest.json" \
            ! -name "docref-index.json" \
            ! -name "fingerprints.json" \
            -exec cp -f {} docs/benchmarks/data/ \;
          ls -la docs/benchmarks/data/

      - name: Fetch live history from Pages (most complete)
        if: steps.jobtype.outputs.skip != 'true'
        run: |
          # The repo copy of history.json may be empty or stale because
          # git push to main is blocked by branch protection. The live
          # Pages version is always the most current because it's written
          # on every successful deploy. Fetch it and use whichever is larger.
          PAGES_URL="https://dlrivada.github.io/Encina/benchmarks/data/history.json"
          PAGES_HISTORY=$(curl -fsSL "$PAGES_URL" 2>/dev/null || echo "")
          # grep -c returns exit code 1 when count=0, so capture separately
          REPO_ENTRIES=$(grep -c timestamp docs/benchmarks/data/history.json 2>/dev/null) || REPO_ENTRIES=0

          if [ -n "$PAGES_HISTORY" ] && echo "$PAGES_HISTORY" | head -1 | grep -q '^\['; then
            PAGES_ENTRIES=$(echo "$PAGES_HISTORY" | grep -c timestamp) || PAGES_ENTRIES=0
            if [ "$PAGES_ENTRIES" -ge "$REPO_ENTRIES" ]; then
              echo "Using Pages history ($PAGES_ENTRIES entries, repo has $REPO_ENTRIES)"
              echo "$PAGES_HISTORY" > docs/benchmarks/data/history.json
            else
              echo "Using repo history ($REPO_ENTRIES entries, Pages has $PAGES_ENTRIES)"
            fi
          else
            echo "Using repo history ($REPO_ENTRIES entries, Pages not available)"
          fi

      - name: Update benchmarks history
        if: steps.jobtype.outputs.skip != 'true'
        run: |
          dotnet run .github/scripts/perf-history.cs -- \
            --kind benchmarks \
            --latest docs/benchmarks/data/latest.json \
            --history docs/benchmarks/data/history.json

      - name: Generate regression badge
        if: steps.jobtype.outputs.skip != 'true'
        run: |
          dotnet run .github/scripts/perf-badge.cs -- \
            --input docs/benchmarks/data/latest.json \
            --output docs/benchmarks/badge.json

      - name: Auto-generate documentation tables from DocRef index
        if: steps.jobtype.outputs.skip != 'true'
        continue-on-error: true
        run: |
          dotnet run .github/scripts/perf-docs-render.cs -- \
            --docref-index docs/benchmarks/data/docref-index.json \
            --docs-root docs

      - name: Generate dynamic benchmark coverage scan
        if: steps.jobtype.outputs.skip != 'true'
        continue-on-error: true
        run: |
          dotnet run .github/scripts/perf-coverage-scan.cs -- \
            --src-root src \
            --manifest-dir .github/perf-manifest \
            --nbomber-root tests/Encina.NBomber \
            --loadtests-root tests/Encina.LoadTests \
            --output docs/benchmarks/data/benchmark-coverage.json

      # Raw data is archived regardless of jobType so short runs can be
      # re-processed later via perf-recalculate.cs against the archived
      # BenchmarkDotNet artifacts (the raw files carry enough statistics for
      # a higher-quality re-run report). The archive is append-only.
      - name: Archive raw data to perf-raw branch
        if: hashFiles('raw-data/**') != ''
        continue-on-error: true
        run: |
          set -e
          RUN_ID="${{ steps.resolve.outputs.run_id }}"
          DATE=$(date -u +"%Y-%m-%d")
          TARGET_DIR="benchmarks/${DATE}/${RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch or create perf-raw branch
          if git fetch origin perf-raw 2>/dev/null; then
            git worktree add .perf-raw origin/perf-raw
          else
            echo "perf-raw branch does not exist yet. Creating orphan branch."
            git worktree add --orphan -b perf-raw .perf-raw
            cd .perf-raw
            git rm -rf . 2>/dev/null || true
            cat > README.md << 'EOF'
          # perf-raw — Raw performance measurement archive

          This orphan branch stores uncompressed raw output from BenchmarkDotNet
          and NBomber runs, one directory per CI workflow run. It exists to
          enable unlimited historical recalculation of performance metrics
          when the measurement methodology evolves, bypassing the 90-day
          retention of GitHub Actions artifacts.

          See ADR-025 (Performance Measurement Infrastructure) and
          `docs/testing/performance-measurement-methodology.md` for the full
          rationale.

          ## Layout

          ```
          benchmarks/
            <YYYY-MM-DD>/
              <runId>/
                metadata.json
                <Module>/BenchmarkDotNet.Artifacts/results/*.json
          load-tests/
            <YYYY-MM-DD>/
              <runId>/
                metadata.json
                nbomber-<stamp>/
                metrics-<stamp>.csv
          ```

          ## Policy

          - Never rewritten; append-only.
          - Unbounded growth accepted per ADR-025 §2 (zero-cost storage on
            public repositories).
          - Compression, pruning, or migration to a different store can be
            introduced later without breaking `perf-recalculate.cs`, which
            iterates whatever directories happen to exist.
          EOF
            git add README.md
            git commit -m "chore(perf-raw): initialize orphan branch"
            cd ..
          fi

          mkdir -p ".perf-raw/${TARGET_DIR}"
          cp -r raw-data/* ".perf-raw/${TARGET_DIR}/" 2>/dev/null || true

          # Write metadata
          cat > ".perf-raw/${TARGET_DIR}/metadata.json" << EOF
          {
            "runId": ${RUN_ID},
            "sha": "${{ github.sha }}",
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "workflow": "Benchmarks",
            "kind": "benchmarks"
          }
          EOF

          cd .perf-raw
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing new to archive."
          else
            git commit -m "perf-raw: archive benchmarks run ${RUN_ID}"
            git push origin HEAD:perf-raw || echo "Warning: push to perf-raw failed; will retry on next run."
          fi
          cd ..
          git worktree remove --force .perf-raw

      - name: Persist latest.json + history.json + docref-index.json + cited-by.json to main
        if: steps.jobtype.outputs.skip != 'true'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/benchmarks/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            ENTRIES=$(grep -c timestamp docs/benchmarks/data/history.json 2>/dev/null || echo 0)
            git commit -m "chore: update benchmarks data ($ENTRIES history entries)"
            git push origin main || echo "Warning: push failed (branch protection). Data will be updated on next manual push."
          fi

      - name: Build Pages site with cross-domain live data preservation
        if: steps.jobtype.outputs.skip != 'true'
        run: |
          # Multiple publish-* workflows share a single gh-pages deployment target.
          # If this workflow copies docs/ as-is, it will ship whatever is currently in
          # docs/coverage/data/ (potentially stale, because publish-coverage.yml updates
          # that subtree on Pages but does NOT commit latest.json back to main). The
          # deploy would then overwrite the live coverage data with the stale repo copy.
          #
          # Fix: overlay the live Pages copies of the sibling domains (coverage, load-tests)
          # on top of our _site so their data survives this deploy untouched. Our own
          # docs/benchmarks subtree has already been refreshed in the earlier step and
          # is authoritative for this run.
          rm -rf _site
          cp -r docs _site

          for domain in coverage load-tests; do
            echo "Fetching live $domain data from Pages..."
            mkdir -p "_site/$domain/data"
            for file in latest.json history.json docref-index.json fingerprints.json cited-by.json benchmark-coverage.json; do
              url="https://dlrivada.github.io/Encina/$domain/data/$file"
              if curl -fsSL -o "_site/$domain/data/$file.new" "$url" 2>/dev/null; then
                mv "_site/$domain/data/$file.new" "_site/$domain/data/$file"
                echo "  ✓ $file"
              else
                rm -f "_site/$domain/data/$file.new"
                echo "  - $file (not on Pages yet)"
              fi
            done
            # Badges (coverage only currently, but harmless to try)
            for badge in badge.svg badge.json; do
              url="https://dlrivada.github.io/Encina/$domain/$badge"
              if curl -fsSL -o "_site/$domain/$badge.new" "$url" 2>/dev/null; then
                mv "_site/$domain/$badge.new" "_site/$domain/$badge"
              else
                rm -f "_site/$domain/$badge.new"
              fi
            done
          done

          echo ""
          echo "Benchmarks dashboard contents:"
          ls -la _site/benchmarks/dashboard/ 2>/dev/null || echo "(dashboard dir missing — first run)"
          echo ""
          echo "Benchmarks data contents:"
          ls -la _site/benchmarks/data/ 2>/dev/null
          echo ""
          echo "Coverage data preserved from Pages:"
          ls -la _site/coverage/data/ 2>/dev/null | head -20

      - name: Upload Pages artifact
        if: steps.jobtype.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        if: steps.jobtype.outputs.skip != 'true'
        id: deployment
        uses: actions/deploy-pages@v5
