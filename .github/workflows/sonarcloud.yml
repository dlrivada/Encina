name: SonarCloud Analysis

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: sonarcloud-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # Static analysis only — coverage is handled by Codecov (see ADR-023)
  # SonarScanner for .NET requires begin → build → end in the SAME job
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore all projects
        run: dotnet restore Encina.slnx

      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          # Coverage is handled by Codecov (see ADR-023, Issue #911)
          # SonarCloud focuses on static analysis: bugs, vulnerabilities, code smells, duplication
          # Exclusions, inclusions, and CPD settings are passed as /d: parameters below
          dotnet sonarscanner begin \
            /k:"dlrivada_Encina" \
            /o:"dlrivada" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10,e11,e12,e13,e14,e15,e16,e17,e18,e19,e20,e21,e22,e23,e24,e25,e26,e27,e28,e29,e30,e31,e32,e33,e34,e35,e36,e37,e38,e39,e40,e41,e42,e43,e44,e45,e46 \
            /d:sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S2077 \
            /d:sonar.issue.ignore.multicriteria.e1.resourceKey="src/Encina.Dapper.*/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e2.ruleKey=csharpsquid:S2077 \
            /d:sonar.issue.ignore.multicriteria.e2.resourceKey="src/Encina.ADO.*/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e3.ruleKey=csharpsquid:S1135 \
            /d:sonar.issue.ignore.multicriteria.e3.resourceKey="src/Encina.Testing/**/NeedsMutationCoverageAttribute.cs" \
            /d:sonar.issue.ignore.multicriteria.e4.ruleKey=csharpsquid:S1135 \
            /d:sonar.issue.ignore.multicriteria.e4.resourceKey="src/Encina.Cli/**/CodeGenerator.cs" \
            /d:sonar.issue.ignore.multicriteria.e5.ruleKey=csharpsquid:S3267 \
            /d:sonar.issue.ignore.multicriteria.e5.resourceKey="src/Encina.Marten/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e6.ruleKey=csharpsquid:S3220 \
            /d:sonar.issue.ignore.multicriteria.e6.resourceKey="src/Encina.Marten/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e7.ruleKey=csharpsquid:S3267 \
            /d:sonar.issue.ignore.multicriteria.e7.resourceKey="src/Encina.DomainModeling/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e8.ruleKey=csharpsquid:S3267 \
            /d:sonar.issue.ignore.multicriteria.e8.resourceKey="src/Encina.Messaging/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e9.ruleKey=csharpsquid:S2737 \
            /d:sonar.issue.ignore.multicriteria.e9.resourceKey="src/Encina.Testing*/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e10.ruleKey=csharpsquid:S1694 \
            /d:sonar.issue.ignore.multicriteria.e10.resourceKey="src/Encina.DomainModeling/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e11.ruleKey=csharpsquid:S6667 \
            /d:sonar.issue.ignore.multicriteria.e11.resourceKey="src/Encina.DomainModeling/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e12.ruleKey=csharpsquid:S1210 \
            /d:sonar.issue.ignore.multicriteria.e12.resourceKey="src/Encina.DomainModeling/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e13.ruleKey=csharpsquid:S1192 \
            /d:sonar.issue.ignore.multicriteria.e13.resourceKey="src/Encina.Cli/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e14.ruleKey=csharpsquid:S6612 \
            /d:sonar.issue.ignore.multicriteria.e14.resourceKey="src/Encina.Marten/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e15.ruleKey=csharpsquid:S3236 \
            /d:sonar.issue.ignore.multicriteria.e15.resourceKey="src/Encina.Messaging/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e16.ruleKey=csharpsquid:S1192 \
            /d:sonar.issue.ignore.multicriteria.e16.resourceKey="src/Encina.ADO.*/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e17.ruleKey=csharpsquid:S1192 \
            /d:sonar.issue.ignore.multicriteria.e17.resourceKey="src/Encina.AmazonSQS/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e18.ruleKey=csharpsquid:S1192 \
            /d:sonar.issue.ignore.multicriteria.e18.resourceKey="src/Encina.OpenTelemetry/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e19.ruleKey=csharpsquid:S1694 \
            /d:sonar.issue.ignore.multicriteria.e19.resourceKey="src/Encina/Core/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e20.ruleKey=csharpsquid:S3267 \
            /d:sonar.issue.ignore.multicriteria.e20.resourceKey="src/Encina/Core/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e21.ruleKey=csharpsquid:S3241 \
            /d:sonar.issue.ignore.multicriteria.e21.resourceKey="src/Encina/Dispatchers/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e22.ruleKey=csharpsquid:S3220 \
            /d:sonar.issue.ignore.multicriteria.e22.resourceKey="src/Encina/Dispatchers/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e23.ruleKey=csharpsquid:S6608 \
            /d:sonar.issue.ignore.multicriteria.e23.resourceKey="src/Encina/Dispatchers/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e24.ruleKey=csharpsquid:S1192 \
            /d:sonar.issue.ignore.multicriteria.e24.resourceKey="src/Encina/Pipeline/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e25.ruleKey=csharpsquid:S1133 \
            /d:sonar.issue.ignore.multicriteria.e25.resourceKey="src/Encina.Testing*/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e26.ruleKey=csharpsquid:S1192 \
            /d:sonar.issue.ignore.multicriteria.e26.resourceKey="src/Encina.Dapper.*/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e27.ruleKey=csharpsquid:S3267 \
            /d:sonar.issue.ignore.multicriteria.e27.resourceKey="src/Encina/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e28.ruleKey=csharpsquid:S3220 \
            /d:sonar.issue.ignore.multicriteria.e28.resourceKey="src/Encina/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e29.ruleKey=csharpsquid:S6608 \
            /d:sonar.issue.ignore.multicriteria.e29.resourceKey="src/Encina/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e30.ruleKey=csharpsquid:S3241 \
            /d:sonar.issue.ignore.multicriteria.e30.resourceKey="src/Encina/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e31.ruleKey=csharpsquid:S1192 \
            /d:sonar.issue.ignore.multicriteria.e31.resourceKey="src/Encina.EntityFrameworkCore/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e32.ruleKey=csharpsquid:S1192 \
            /d:sonar.issue.ignore.multicriteria.e32.resourceKey="src/Encina.MongoDB/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e33.ruleKey=csharpsquid:S6966 \
            /d:sonar.issue.ignore.multicriteria.e33.resourceKey="src/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e34.ruleKey=csharpsquid:S2077 \
            /d:sonar.issue.ignore.multicriteria.e34.resourceKey="src/Encina.EntityFrameworkCore/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e35.ruleKey=csharpsquid:S2068 \
            /d:sonar.issue.ignore.multicriteria.e35.resourceKey="src/Encina/Modules/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e36.ruleKey=csharpsquid:S1192 \
            /d:sonar.issue.ignore.multicriteria.e36.resourceKey="src/Encina.AspNetCore/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e37.ruleKey=csharpsquid:S1192 \
            /d:sonar.issue.ignore.multicriteria.e37.resourceKey="src/Encina.DomainModeling/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e38.ruleKey=csharpsquid:S1192 \
            /d:sonar.issue.ignore.multicriteria.e38.resourceKey="src/Encina/Modules/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e39.ruleKey=csharpsquid:S1192 \
            /d:sonar.issue.ignore.multicriteria.e39.resourceKey="src/Encina/Sharding/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e40.ruleKey=csharpsquid:S4136 \
            /d:sonar.issue.ignore.multicriteria.e40.resourceKey="src/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e41.ruleKey=csharpsquid:S101 \
            /d:sonar.issue.ignore.multicriteria.e41.resourceKey="src/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e42.ruleKey=csharpsquid:S1192 \
            /d:sonar.issue.ignore.multicriteria.e42.resourceKey="src/Encina.Messaging/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e43.ruleKey=csharpsquid:S3776 \
            /d:sonar.issue.ignore.multicriteria.e43.resourceKey="src/Encina.ADO.*/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e44.ruleKey=csharpsquid:S3776 \
            /d:sonar.issue.ignore.multicriteria.e44.resourceKey="src/Encina.Dapper.*/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e45.ruleKey=csharpsquid:S3776 \
            /d:sonar.issue.ignore.multicriteria.e45.resourceKey="src/Encina.MongoDB/**/*.cs" \
            /d:sonar.issue.ignore.multicriteria.e46.ruleKey=csharpsquid:S3776 \
            /d:sonar.issue.ignore.multicriteria.e46.resourceKey="src/Encina.EntityFrameworkCore/**/*.cs" \
            /d:sonar.inclusions="src/**/*.cs,.github/workflows/**/*.yml" \
            /d:sonar.exclusions="**/Migrations/**,**/*.g.cs,**/obj/**,**/bin/**" \
            /d:sonar.cpd.exclusions="src/Encina.Dapper.*/**/*.cs,src/Encina.ADO.*/**/*.cs,src/Encina.Testing*/**/*.cs,src/Encina.EntityFrameworkCore/**/*.cs,src/Encina.MongoDB/**/*.cs,src/Encina.Caching.*/**/*.cs,src/Encina.DistributedLock.*/**/*.cs,src/Encina.Marten/**/*.cs" \
            /d:sonar.verbose=false

      - name: Build for SonarCloud analysis
        run: dotnet build Encina.slnx --configuration Release --no-restore

      # No test execution needed — SonarScanner performs static analysis on built code
      # Coverage is collected by Codecov in the CI workflow (see ADR-023)

      - name: End SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
