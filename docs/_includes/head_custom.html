<style>
  /* Override just-the-docs centering layout for wide screens */
  .main {
    max-width: none !important;
  }
  @media (min-width: 66.5rem) {
    .side-bar {
      width: 16.5rem !important;
      min-width: 16.5rem !important;
    }
    .side-bar + .main {
      margin-left: 16.5rem !important;
    }
  }
  @media (min-width: 1400px) {
    .main-content {
      font-size: 1.05rem !important;
      line-height: 1.6 !important;
    }
  }
  @media (min-width: 2000px) {
    .main-content {
      font-size: 1.1rem !important;
      line-height: 1.65 !important;
    }
  }
</style>

<script>
  // Override Mermaid theme BEFORE just-the-docs initializes it.
  // just-the-docs does not pass nested themeVariables from _config.yml.
  window.mermaid_config = {
    theme: "base",
    themeVariables: {
      darkMode: true,
      background: "#0d1117",
      fontFamily: "system-ui, sans-serif",
      fontSize: "14px",

      primaryColor: "#1c2d42",
      primaryTextColor: "#ffffff",
      primaryBorderColor: "#58a6ff",

      secondaryColor: "#2a1c42",
      secondaryTextColor: "#ffffff",
      secondaryBorderColor: "#bc8cff",

      tertiaryColor: "#1c3328",
      tertiaryTextColor: "#ffffff",
      tertiaryBorderColor: "#56d364",

      noteBkgColor: "#161b22",
      noteTextColor: "#ffffff",
      noteBorderColor: "#484f58",

      lineColor: "#58a6ff",
      textColor: "#ffffff",

      mainBkg: "#1c2d42",
      nodeBorder: "#58a6ff",
      nodeTextColor: "#ffffff",

      clusterBkg: "#0d1117",
      clusterBorder: "#484f58",
      titleColor: "#ffffff",
      edgeLabelBackground: "#0d1117",

      actorBkg: "#1c2d42",
      actorTextColor: "#ffffff",
      actorBorder: "#58a6ff",
      actorLineColor: "#58a6ff",
      signalColor: "#58a6ff",
      signalTextColor: "#ffffff",
      labelBoxBkgColor: "#1c2d42",
      labelBoxBorderColor: "#58a6ff",
      labelTextColor: "#ffffff",
      loopTextColor: "#ffffff",
      activationBorderColor: "#58a6ff",
      activationBkgColor: "#1c2d42",
      sequenceNumberColor: "#ffffff"
    }
  };

  // Intercept mermaid.initialize to inject our theme
  document.addEventListener("DOMContentLoaded", function() {
    var checkMermaid = setInterval(function() {
      if (window.mermaid) {
        clearInterval(checkMermaid);
        window.mermaid.initialize(window.mermaid_config);
      }
    }, 50);
  });
</script>
