title: Encina
description: Build resilient, regulation-ready .NET 10 applications with Railway Oriented Programming
remote_theme: just-the-docs/just-the-docs@v0.10.1
color_scheme: light

plugins:
  - jekyll-remote-theme

url: https://dlrivada.github.io
baseurl: /Encina

aux_links:
  "GitHub":
    - https://github.com/dlrivada/Encina

aux_links_new_tab: true

heading_anchors: true

mermaid:
  version: "11"
  config:
    theme: "base"
    themeVariables:
      darkMode: true
      background: "#0d1117"
      fontFamily: "system-ui, sans-serif"
      fontSize: "14px"
      # All node types: dark fill, white text, bright borders
      primaryColor: "#1c2d42"
      primaryTextColor: "#ffffff"
      primaryBorderColor: "#58a6ff"
      secondaryColor: "#2a1c42"
      secondaryTextColor: "#ffffff"
      secondaryBorderColor: "#bc8cff"
      tertiaryColor: "#1c3328"
      tertiaryTextColor: "#ffffff"
      tertiaryBorderColor: "#56d364"
      # Notes, labels, lines
      noteBkgColor: "#161b22"
      noteTextColor: "#ffffff"
      noteBorderColor: "#484f58"
      lineColor: "#58a6ff"
      textColor: "#ffffff"
      # Node defaults
      mainBkg: "#1c2d42"
      nodeBorder: "#58a6ff"
      nodeTextColor: "#ffffff"
      # Clusters (subgraphs)
      clusterBkg: "#0d1117"
      clusterBorder: "#484f58"
      titleColor: "#ffffff"
      # Labels on edges
      edgeLabelBackground: "#0d1117"
      # Sequence diagrams
      actorBkg: "#1c2d42"
      actorTextColor: "#ffffff"
      actorBorder: "#58a6ff"
      actorLineColor: "#58a6ff"
      signalColor: "#58a6ff"
      signalTextColor: "#ffffff"
      labelBoxBkgColor: "#1c2d42"
      labelBoxBorderColor: "#58a6ff"
      labelTextColor: "#ffffff"
      loopTextColor: "#ffffff"
      activationBorderColor: "#58a6ff"
      activationBkgColor: "#1c2d42"
      sequenceNumberColor: "#ffffff"

nav_enabled: true
search_enabled: true
search.button: true

back_to_top: true
back_to_top_text: "Back to top"

footer_content: >-
  <a href="https://github.com/dlrivada/Encina">Encina</a> &mdash;
  Railway Oriented Programming for .NET 10.
  Distributed under the <a href="https://github.com/dlrivada/Encina/blob/main/LICENSE">MIT License</a>.

# Exclude non-documentation directories from Jekyll processing
exclude:
  - _site/
  - "*.csproj"
  - plans/
  - releases/
  - infrastructure/
  - testing/
  - data/
  - reports/
  - spikes/
  - migrations/
  - en/
  - assets/
  - benchmarks/
  - configuration/
  - security/
  - coverage/data/.gitkeep
