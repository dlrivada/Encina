title: Encina
description: Build resilient, regulation-ready .NET 10 applications with Railway Oriented Programming
remote_theme: just-the-docs/just-the-docs@v0.10.1
color_scheme: light

plugins:
  - jekyll-remote-theme

url: https://dlrivada.github.io
baseurl: /Encina

aux_links:
  "GitHub":
    - https://github.com/dlrivada/Encina

aux_links_new_tab: true

heading_anchors: true

mermaid:
  version: "11"
  config:
    theme: "base"
    themeVariables:
      darkMode: true
      background: "#1e1e2e"
      primaryColor: "#1e3a5f"
      primaryTextColor: "#e0e0e0"
      primaryBorderColor: "#58a6ff"
      secondaryColor: "#2d1f4e"
      secondaryTextColor: "#e0e0e0"
      secondaryBorderColor: "#a78bfa"
      tertiaryColor: "#1a3328"
      tertiaryTextColor: "#e0e0e0"
      tertiaryBorderColor: "#4ade80"
      lineColor: "#8b949e"
      textColor: "#e0e0e0"
      mainBkg: "#1e3a5f"
      nodeBorder: "#58a6ff"
      clusterBkg: "#161b22"
      clusterBorder: "#30363d"
      titleColor: "#e0e0e0"
      edgeLabelBackground: "#161b22"
      nodeTextColor: "#e0e0e0"

nav_enabled: true
search_enabled: true
search.button: true

back_to_top: true
back_to_top_text: "Back to top"

footer_content: >-
  <a href="https://github.com/dlrivada/Encina">Encina</a> &mdash;
  Railway Oriented Programming for .NET 10.
  Distributed under the <a href="https://github.com/dlrivada/Encina/blob/main/LICENSE">MIT License</a>.

# Exclude non-documentation directories from Jekyll processing
exclude:
  - _site/
  - "*.csproj"
  - plans/
  - releases/
  - infrastructure/
  - testing/
  - data/
  - reports/
  - spikes/
  - migrations/
  - en/
  - assets/
  - benchmarks/
  - configuration/
  - security/
  - coverage/data/.gitkeep
