# Lychee link checker configuration
# https://lychee.cli.rs/configuration/

# Accept these status codes as valid
# 502 included because GitHub occasionally returns it for valid issue URLs
accept = [200, 206, 301, 302, 307, 308, 502]

# Timeout per request
timeout = 20

# Maximum number of retries per request
max_retries = 3

# Exclude these URLs/patterns from checking
exclude = [
    # Mail links
    "^mailto:",
    # Localhost / loopback
    "localhost",
    "127\\.0\\.0\\.1",
    # Sites that block automated link checkers
    "openpolicyagent\\.org",
    "uber\\.com",
    "howtech\\.substack\\.com",
    "antondevtips\\.com",
    "visualstudiomagazine\\.com",
    "softwarepatternslexicon\\.com",
    "ico\\.org\\.uk",
    "cookiebot\\.com",
    "onetrust\\.com",
    "csrc\\.nist\\.gov",
    "ipc\\.on\\.ca",
    "enisa\\.europa\\.eu",
    "edpb\\.europa\\.eu",
    "eur-lex\\.europa\\.eu",
    "endjin\\.com",
    "scylladb\\.com",
    "learn\\.microsoft\\.com",
    "docs\\.microsoft\\.com",
    "docs\\.docker\\.com",
    "mongodb\\.com/blog",
    "eventstore\\.com",
    "blog\\.twitter\\.com",
    "developer\\.hashicorp\\.com",
    "vaultproject\\.io",
    "netflixtechblog\\.com",
    "medium\\.com",
    "towardsdev\\.com",
    "developersvoice\\.com",
    # Sites that frequently timeout or block CI
    "docs\\.nestjs\\.com",
    "opentelemetry\\.io",
    "masstransit\\.io",
    # Future domain - not yet registered
    "encina\\.dev",
]

# Exclude link fragments (anchors) from checking
include_fragments = false
